<!DOCTYPE html>
<html>
<head>
    <title> JS challenge </title>
    <style>
        body {
             background-color: lightgray;
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 20px;
        } 

    </style>
    <body>
        <input type="number" id="number1" placeholder="enter number 1">
        <input type="number" id="number2" placeholder="enter number 2">
        <button onclick= "calculate()">calculate</button>
        <button onclick= "calculate('+')">+</button>
        <button onclick= "calculate('-')">-</button>  
        <button onclick= "calculate('*')">*</button>
        <button onclick= "calculate('/')">/</button>
        <div id="result"></div>
        <script>
            function calculate(operator) {
                const a = Number(document.getElementById("number1").value);
                const b = Number(document.getElementById("number2").value);
                let result;
                if (operator==="+") result = a +b;
                if (operator==="-") result = a -b;
                if (operator==="*") result = a *b;  
                if (operator==="/") result = a /b;
                
                document.getElementById("result").innerText = "Result: " + result;
            }
        </script>
    </body>
</html>
