<!DOCTYPE html>
<html lang="en">
<head>
    <title>to do app</title>
    <style>
        body {
            background-color: lightblue;
            color: yellow;
            font-family: Arial, Helvetica, sans-serif;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;

        }
        input {
            padding: 10px 20px;
            font-size: 16px;
            background-color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 8px;
        }
        #todo-list { 
            margin-top: 20px;

        }
        .todo-item {
            padding: 12px;
            background-color: #222;
            margin-bottom: 8px;
            border-radius: 6px;
        }
    
</style>
</head>
<body>
    <h1> to do app</h1>
    <input type="text" id="task-input" placeholder="type new task">
    <button onclick="addtodo()">add</button>
    <div id="todo-list"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase_url = 'https://icwmtqfpbefntfxboofr.supabase.co'
        const supabase_key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imljd210cWZwYmVmbnRmeGJvb2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mzg3NzgsImV4cCI6MjA5MjUxNDc3OH0.N1gsPt4eZav2LL2XDttqlsAB06b1UzXb4bFTMi3K8NM'
        const client = supabase.createClient(supabase_url, supabase_key)
        async function loadtodo() {
            const { data, error} = await client.from('todos').select("*")
        
                if (error) { console.error(error); return }
            const list = document.getElementById('todo-list')
            list.innerHTML = ''
            data.forEach(todo => {
                list.innerHTML += '<div class="todo-item">' + todo.task + '</div>'
            }) 
        }
        async function addtodo() {
            const input = document.getElementById('task-input')
            const task = input.value 
            if (!task) return 
            const {error} = await client.from('todos').insert({ task: task })
            if (error) { console.error(error); return}
            input.value =''
            loadtodo()

        }
        loadtodo()

    </script>
</body>
</html>
