<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý tài xế</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="shared.js"></script>
</head>
<body>
    <div class="header">
        <h2>👥 Quản lý tài xế</h2>
        <div style="display: flex; gap: 10px">
            <button class="btn" onclick="window.location.href='owner-dashboard.html'">← Dashboard</button>
            <button class="btn btn-logout" onclick="logout()">Logout</button>
            <button class="btn btn-success" onclick="exportExcel()">📊 Excel</button>
            <button class="btn btn-purple" onclick="exportPDF()">🖨️ PDF</button>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <h3>Thêm tài xế mới</h3>
            <div class="form-row">
                <input type="text" id="new-name" placeholder="Họ và tên">
                <input type="email" id="new-email" placeholder="Email đăng nhập">
                <input type="text" id="new-sdt" placeholder="Số điện thoại">
                <button class="btn" onclick="addDriver()">Thêm</button>
            </div>
            <p id="add-msg" style="display:none; color:#27ae60; font-weight:bold"></p>
        </div>
        <div class="card">
            <h3>Danh sách tài xế</h3>
            <div class="filter-bar">
                <label style="font-weight: bold">Tháng</label>
                <input type="month" id="filter-month">
                <button class="btn" onclick="loadDrivers()">Lọc</button>
                <button class="btn btn-gray" onclick="clearFilter()">Tất cả</button>
            </div>
            <div class="table-scroll wide">
                <table>
                    <thead>
                        <tr>
                            <th> Họ và tên</th>
                            <th> Email</th>
                            <th> SĐT</th>
                            <th> Số chuyến</th>
                            <th> Tổng lương</th>
                            <th> Tạm ứng</th>
                            <th> Thực nhận</th>
                            <th> Xóa</th>
                        </tr>
                    </thead>
                    <tbody id="driver-list">
                        <tr><td colspan="8">Đang tải ...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        function showToast(msg, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.className = 'toast', 3000);
        }
        const sb = createSb()

        function addCell(row, text) {
            const cell = document.createElement('td')
            cell.textContent = text
            row.appendChild(cell)
            return cell
        }

        function setDriverMessage(message) {
            const tbody = document.getElementById('driver-list')
            tbody.textContent = ''
            const row = document.createElement('tr')
            const cell = document.createElement('td')
            cell.colSpan = 8
            cell.textContent = message
            row.appendChild(cell)
            tbody.appendChild(row)
        }

        async function addDriver() {
            const full_name = document.getElementById('new-name').value.trim()
            const email = document.getElementById('new-email').value.trim().toLowerCase()
            const sdt = document.getElementById('new-sdt').value.trim()
            if (!full_name || !email || !sdt) {
                showToast('Vui lòng điền đủ thông tin', 'error')
                return
            }

            const { error } = await sb.from('users').insert({
                full_name,
                email,
                sdt,
                role: 'driver'
            })

            if (error) {
                showToast('Lỗi: ' + error.message, 'error')
            } else {
                document.getElementById('add-msg').style.display = 'block'
                document.getElementById('add-msg').textContent = 'Thêm tài xế thành công!'
                document.getElementById('new-name').value = ''
                document.getElementById('new-email').value = ''
                document.getElementById('new-sdt').value = ''
                setTimeout(() => {
                    document.getElementById('add-msg').style.display = 'none'
                    loadDrivers()
                }, 1200)
            }
        }

        async function deleteDriver(id, name) {
            if (!confirm('Xóa tài xế ' + name + '?')) return
            const { error } = await sb.from('users').delete().eq('id', id)
            if (error) showToast('Lỗi: ' + error.message, 'error')
            else loadDrivers()
        }

        async function loadDrivers() {
            try {
                const month = document.getElementById('filter-month').value
                const { data: drivers, error: driversError } = await sb
                    .from('users')
                    .select('*')
                    .eq('role', 'driver')

                if (driversError) throw new Error(driversError.message)

                if (!drivers || drivers.length === 0) {
                    setDriverMessage('Chưa có tài xế nào')
                    return
                }

                let tripsQuery = sb.from('trips').select('tai_xe_id, luong_chuyen, ngay_bat_dau')
                if (month) {
                    const start = month + '-01'
                    const end = new Date(month + '-01')
                    end.setMonth(end.getMonth() + 1)
                    tripsQuery = tripsQuery.gte('ngay_bat_dau', start + 'T00:00:00').lt('ngay_bat_dau', end.toISOString().split('T')[0] + 'T00:00:00')
                }

                const { data: trips, error: tripsError } = await tripsQuery
                if (tripsError) throw new Error(tripsError.message)

                let advancesQuery = sb.from('tam_ung_thang').select('*')
                if (month) advancesQuery = advancesQuery.eq('thang', month)
                const { data: advances, error: advancesError } = await advancesQuery
                if (advancesError) throw new Error(advancesError.message)

                const tbody = document.getElementById('driver-list')
                tbody.textContent = ''
                drivers.forEach(d => {
                    const myTrips = (trips || []).filter(t => t.tai_xe_id === d.id)
                    const totalLuong = myTrips.reduce((sum, t) => sum + (Number(t.luong_chuyen) || 0), 0)
                    const myAdvances = (advances || []).filter(a => a.tai_xe_id === d.id)
                    const totalAdvance = myAdvances.reduce((sum, a) => sum + (Number(a.so_tien) || 0), 0)
                    const thucNhan = totalLuong - totalAdvance
                    const row = document.createElement('tr')

                    addCell(row, d.full_name || '-')
                    addCell(row, d.email || '-')
                    addCell(row, d.sdt || '-')
                    addCell(row, myTrips.length + ' chuyến')
                    addCell(row, formatMoney(totalLuong)).style.color = '#e67e22'
                    addCell(row, formatMoney(totalAdvance)).style.color = '#e74c3c'
                    const thucNhanCell = addCell(row, formatMoney(thucNhan))
                    thucNhanCell.style.color = thucNhan >= 0 ? '#27ae60' : '#e74c3c'
                    thucNhanCell.style.fontWeight = 'bold'

                    const actionCell = document.createElement('td')
                    const actions = document.createElement('div')
                    actions.style.display = 'flex'
                    actions.style.gap = '6px'
                    actions.style.flexWrap = 'wrap'

                    const advanceButton = document.createElement('button')
                    advanceButton.className = 'btn btn-success'
                    advanceButton.style.padding = '6px 12px'
                    advanceButton.textContent = '+ Tạm ứng'
                    advanceButton.addEventListener('click', () => addAdvance(d.id, d.full_name || 'tài xế'))

                    const deleteButton = document.createElement('button')
                    deleteButton.className = 'btn btn-danger'
                    deleteButton.style.padding = '6px 12px'
                    deleteButton.textContent = 'Xóa'
                    deleteButton.addEventListener('click', () => deleteDriver(d.id, d.full_name || 'tài xế'))

                    actions.append(advanceButton, deleteButton)
                    actionCell.appendChild(actions)
                    row.appendChild(actionCell)
                    tbody.appendChild(row)
                })
            } catch (err) {
                console.error('Load drivers error:', err)
                setDriverMessage('Không thể tải dữ liệu tài xế')
                showToast('Lỗi: ' + err.message, 'error')
            }
        }

        async function addAdvance(driverId, driverName) {
            const month = document.getElementById('filter-month').value
            if (!month) {
                showToast('Vui lòng chọn tháng trước!', 'error')
                return
            }

            const { data: existing, error: checkError } = await sb
                .from('tam_ung_thang')
                .select('id, so_tien')
                .eq('tai_xe_id', driverId)
                .eq('thang', month)
            if (checkError) {
                showToast('Lỗi kiểm tra tạm ứng: ' + checkError.message, 'error')
                return
            }
            if (existing && existing.length > 0) {
                const total = existing.reduce((s, r) => s + (Number(r.so_tien) || 0), 0)
                if (!confirm(`${driverName} đã có ${existing.length} tạm ứng tháng ${month} (tổng ${total.toLocaleString('vi-VN')} đ). Thêm nữa?`)) return
            }

            const amount = prompt(`Nhập số tiền tạm ứng cho ${driverName} (tháng ${month}):`)
            if (amount === null) return
            const parsedAmount = Number(amount)
            if (amount.trim() === '' || !Number.isFinite(parsedAmount) || parsedAmount < 0) {
                showToast('Số tiền tạm ứng không hợp lệ', 'error')
                return
            }

            const { error } = await sb.from('tam_ung_thang').insert({
                tai_xe_id: driverId,
                thang: month,
                so_tien: parsedAmount
            })

            if (error) showToast('Lỗi: ' + error.message, 'error')
            else loadDrivers()
        }

        function clearFilter() {
            document.getElementById('filter-month').value = ''
            loadDrivers()
        }

        async function logout() {
            await sb.auth.signOut()
            window.location.href = 'bai10.html'
        }

        function exportExcel() {
            if (typeof XLSX === 'undefined') {
                showToast('Không thể tải thư viện Excel', 'error')
                return
            }

            const month = document.getElementById('filter-month').value || 'Tất cả'
            const rows = [['Họ tên', 'Email', 'SĐT', 'Số chuyến', 'Tổng lương', 'Tạm ứng', 'Thực nhận']]

            document.querySelectorAll('#driver-list tr').forEach(tr => {
                const cells = tr.querySelectorAll('td')
                if (cells.length >= 7) {
                    rows.push([
                        cells[0].textContent,
                        cells[1].textContent,
                        cells[2].textContent,
                        cells[3].textContent,
                        cells[4].textContent,
                        cells[5].textContent,
                        cells[6].textContent
                    ])
                }
            })

            const ws = XLSX.utils.aoa_to_sheet(rows)
            const wb = XLSX.utils.book_new()
            XLSX.utils.book_append_sheet(wb, ws, 'Lương tài xế')
            XLSX.writeFile(wb, `luong-tai-xe-${month}.xlsx`)
        }

        function exportPDF() {
            window.print()
        }

        async function initPage() {
            setDriverMessage('Đang tải ...')
            const auth = await requireRole(sb, 'owner')
            if (auth) loadDrivers()
        }

        setupLogoutListener(sb)
        initPage()
    </script>
    <div class="toast" id="toast"></div>
</body>
</html>
