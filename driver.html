<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý tài xế</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body { font-family: Arial, Helvetica, sans-serif; background: #f0f2f5;}
        .header {
            background: #1565c0;
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container { padding: 24px; max-width: 900px; margin: 0 auto;}
        .card {
            background: white;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }
        .card h3 {margin-bottom: 16px; color: #1565c0;}
        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .form-row input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
        }
        .btn {
            background: #1565c0;
            color: white;
            border: none;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }
        .btn:hover { background: #1976d2;}
        .btn-red {background: #e74c3c}
        .btn-red:hover { background: #c0392b; }
        .btn-logout { background: #e74c3c; }
        .filter-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }
        table {width: 100%; border-collapse: collapse;}
        th { background: #1565c0; color: white; padding: 12px; text-align: left; }
        tr:hover td { background: #f8f9f5;}
        @media print {
    .header, .filter-bar, .btn { display: none !important; }
    body { background: white; }
    table { box-shadow: none; }
}
    </style>
</head>
<body>
    <div class="header">
        <h2>👥 Quản lý tài xế</h2>
        <div style="display: flex; gap: 10px">
            <button class="btn" onclick="window.location.href='owner-dashboard.html'">← Dashboard</button>
            <button class="btn btn-logout" onclick="logout()">Logout</button>
            <button class="btn" style="background:#27ae60" onclick="exportExcel()">📊 Excel</button>
            <button class="btn" style="background:#8e44ad" onclick="exportPDF()">🖨️ PDF</button>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <h3>Thêm tài xế mới</h3>
            <div class="form-row">
                <input type="text" id="new-name" placeholder="Họ và tên">
                <input type="text" id="new-sdt" placeholder="Số điện thoại">
                <button class="btn" onclick="addDriver()">Thêm</button>
            </div>
            <p id="add-msg" style="display:none; color:#27ae60; font-weight:bold"></p>
        </div>
        <div class="card">
            <h3>Danh sách tài xế</h3>
            <div class="filter-bar">
                <label style="font-weight: bold">Tháng</label>
                <input type="month" id="filter-month">
                <button class="btn" onclick="loadDrivers()">Lọc</button>
                <button class="btn" style="background: #888" onclick="clearFilter()">Tất cả</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th> Họ và tên</th>
                        <th> SĐT</th>
                        <th> Số chuyến</th>
                        <th> Tổng lương</th>
                        <th> Tạm ứng</th>
                        <th> Thực nhận</th>
                        <th> Xóa</th>
                    </tr>
                </thead>
                <tbody id="driver-list">
                    <tr><td colspan="7">Đang tải ...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        const { createClient } = supabase
        const sb = createClient(
            'https://icwmtqfpbefntfxboofr.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imljd210cWZwYmVmbnRmeGJvb2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mzg3NzgsImV4cCI6MjA5MjUxNDc3OH0.N1gsPt4eZav2LL2XDttqlsAB06b1UzXb4bFTMi3K8NM'
        )

        function formatMoney(n) {
            return (n || 0).toLocaleString('vi-VN') + 'đ'
        }

        async function addDriver() {
            const full_name = document.getElementById('new-name').value.trim()
            const sdt = document.getElementById('new-sdt').value.trim()
            if (!full_name || !sdt) {
                alert('Vui lòng điền đủ thông tin')
                return
            }
            const { error } = await sb.from('users').insert({
                full_name,
                sdt,
                role: 'driver'
            })
            if (error) {
                alert('lỗi: ' + error.message)
            } else {
                document.getElementById('add-msg').style.display = 'block'
                document.getElementById('add-msg').textContent = 'Thêm tài xế thành công!'
                document.getElementById('new-name').value = ''
                document.getElementById('new-sdt').value = ''
                setTimeout(() => {
                    document.getElementById('add-msg').style.display = 'none'
                    loadDrivers()
                }, 2000)
            }
        }

        async function deleteDriver(id, name) {
            if (!confirm('xóa tài xế ' + name + '?')) return
            const { error } = await sb.from('users').delete().eq('id', id)
            if (error) alert('Lỗi: ' + error.message)
            else loadDrivers()
        }

        async function loadDrivers() {
            const month = document.getElementById('filter-month').value
            const { data: drivers } = await sb
                .from('users')
                .select('*')
                .eq('role', 'driver')

            if (!drivers || drivers.length === 0) {
                document.getElementById('driver-list').innerHTML =
                    '<tr><td colspan="7">Chưa có tài xế nào</td></tr>'
                return
            }

            let tripsQuery = sb.from('trips').select('tai_xe_id, luong_chuyen, ngay')
            if (month) {
                const start = month + '-01'
                const end = new Date(month + '-01')
                end.setMonth(end.getMonth() + 1)
                tripsQuery = tripsQuery.gte('ngay', start).lt('ngay', end.toISOString().split('T')[0])
            }

            const { data: trips } = await tripsQuery
            let advencesQuery = sb.from('tam_ung_thang').select('*')
            if (month) advencesQuery = advencesQuery.eq('thang', month)
            const { data: advances } = await advencesQuery
            const tbody = document.getElementById('driver-list')
            tbody.innerHTML = drivers.map(d => {
    const myTrips = (trips || []).filter(t => t.tai_xe_id === d.id)
    const totalLuong = myTrips.reduce((sum, t) => sum + (t.luong_chuyen || 0), 0)
    const myAdvances = (advances || []).filter(a => a.tai_xe_id === d.id)
    const totalAdvance = myAdvances.reduce((sum, a) => sum + (a.so_tien || 0), 0)
    const thucNhan = totalLuong - totalAdvance
    const safeName = (d.full_name || '').replace(/'/g, "\\'")

    return `
        <tr>
            <td>${d.full_name || '-'}</td>
            <td>${d.sdt || '-'}</td>
            <td>${myTrips.length} chuyến</td>
            <td style="color:#e67e22">${formatMoney(totalLuong)}</td>
            <td style="color:#e74c3c">${formatMoney(totalAdvance)}</td>
            <td style="color:${thucNhan >= 0 ? '#27ae60' : '#e74c3c'}; font-weight:bold">${formatMoney(thucNhan)}</td>
            <td style="display:flex; gap:6px">
                <button class="btn" style="background:#27ae60; padding:6px 12px" onclick="addAdvance('${d.id}', '${safeName}')">+ Tạm ứng</button>
                <button class="btn btn-red" style="padding:6px 12px" onclick="deleteDriver('${d.id}', '${safeName}')">Xóa</button>
            </td>
        </tr>
    `
}).join('')
        }
        async function addAdvance(driverId, driverName) {
    const month = document.getElementById('filter-month').value
    if (!month) {
        alert('Vui lòng chọn tháng trước!')
        return
    }
    const amount = prompt(`Nhập số tiền tạm ứng cho ${driverName} (tháng ${month}):`)
    if (!amount) return
    
    const { error } = await sb.from('tam_ung_thang').insert({
        tai_xe_id: driverId,
        thang: month,
        so_tien: parseInt(amount) || 0
    })
    
    if (error) alert('Lỗi: ' + error.message)
    else loadDrivers()
}

        function clearFilter() {
            document.getElementById('filter-month').value = ''
            loadDrivers()
        }

        async function logout() {
            await sb.auth.signOut()
            window.location.href = 'bai10.html'
        }

        loadDrivers()
        function exportExcel() {
    const month = document.getElementById('filter-month').value || 'Tất cả'
    const rows = [['Họ tên', 'SĐT', 'Số chuyến', 'Tổng lương', 'Tạm ứng', 'Thực nhận']]

    document.querySelectorAll('#driver-list tr').forEach(tr => {
        const cells = tr.querySelectorAll('td')
        if (cells.length >= 6) {
            rows.push([
                cells[0].textContent,
                cells[1].textContent,
                cells[2].textContent,
                cells[3].textContent,
                cells[4].textContent,
                cells[5].textContent
            ])
        }
    })

    const ws = XLSX.utils.aoa_to_sheet(rows)
    const wb = XLSX.utils.book_new()
    XLSX.utils.book_append_sheet(wb, ws, 'Lương tài xế')
    XLSX.writeFile(wb, `luong-tai-xe-${month}.xlsx`)
}

function exportPDF() {
    window.print()
}
    </script>
</body>
</html>
