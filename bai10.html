<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Vận tải</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="card">
        <div id="login-section">
            <div class="logo">🚛</div>
            <h2>Quản lý Vận tải</h2>
            <p>Đăng nhập để tiếp tục</p>
            <button class="btn-google" onclick="loginGoogle()" id="btn-login">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#FFF" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-20.5 0-1.4-.1-2.7-.5-4-.1.5z"/>
                </svg>
                Đăng nhập với Google
            </button>
        </div>

        <div class="loading" id="loading-section">
            <div class="spinner"></div>
            <p id="loading-text">Đang xác thực...</p>
        </div>

        <div id="dashboard">
            <img id="avatar" src="" width="60" style="border-radius:50%; margin-bottom:16px;">
            <h3 id="user-name"></h3>
            <p id="user-email" style="color:#888; font-size:14px; margin-top:4px;"></p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const {createClient} = supabase;
        const sb = createClient(
            'https://icwmtqfpbefntfxboofr.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imljd210cWZwYmVmbnRmeGJvb2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mzg3NzgsImV4cCI6MjA5MjUxNDc3OH0.N1gsPt4eZav2LL2XDttqlsAB06b1UzXb4bFTMi3K8NM'
        );

        function showToast(msg, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        function showLoading(text = 'Đang xác thực...') {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('loading-section').style.display = 'flex';
            document.getElementById('loading-text').textContent = text;
        }

        function showLogin() {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('loading-section').style.display = 'none';
        }

        async function loginGoogle() {
            document.getElementById('btn-login').disabled = true;
            const {error} = await sb.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: 'https://fucking-learning-code.vercel.app/bai10.html' }
            });
            if (error) {
                showToast('Đăng nhập thất bại: ' + error.message, 'error');
                document.getElementById('btn-login').disabled = false;
            }
        }

        async function logout() {
            await sb.auth.signOut();
            window.location.href = 'https://fucking-learning-code.vercel.app/bai10.html';
        }

        async function checkUserRole(user) {
            const {data} = await sb
                .from('users')
                .select('role')
                .eq('email', user.email)
                .maybeSingle();

            if (!data) {
                const {error: insertError} = await sb.from('users').insert({
                    id: user.id,
                    email: user.email,
                    full_name: user.user_metadata.full_name,
                    role: 'driver'
                });
                if (insertError) console.log('Insert error:', insertError.message);
                return 'driver';
            }
            return data.role;
        }

        async function redirectByRole(user) {
            document.getElementById('user-name').textContent = user.user_metadata.full_name;
            document.getElementById('user-email').textContent = user.email;
            document.getElementById('avatar').src = user.user_metadata.avatar_url;
            document.getElementById('dashboard').style.display = 'block';

            const role = await checkUserRole(user);
            showLoading(role === 'owner' ? 'Đang vào dashboard...' : 'Đang vào trang tài xế...');

            setTimeout(() => {
                window.location.href = role === 'owner' ? 'owner-dashboard.html' : 'driver-page.html';
            }, 600);
        }

        async function checkUser() {
            showLoading();
            const {data: {session}} = await sb.auth.getSession();
            if (session) {
                await redirectByRole(session.user);
                return;
            } else {
                showLogin();
            }

            sb.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN' && session) {
                    await redirectByRole(session.user);
                } else if (event === 'SIGNED_OUT') {
                    showLogin();
                }
            });
        }

        checkUser();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('SW registered'))
                .catch(err => console.log('SW error:', err));
        }
    </script>
</body>
</html>
