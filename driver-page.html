<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Driver page</title>
        <link rel="manifest" href="/manifest.json">
        <link rel="stylesheet" href="/style.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    </head>
    <body>
        <div class ="header">
            <h2> 🚛 Driver Page </h2>
            <button class="btn btn-logout" onclick ="logout()">Đăng xuất</button>

        </div>
        <div class = "container">
            <div class = "card">
                <h3> Nhập Chuyến</h3>
                <div class ="form-group">
                    <label> Ngày </label>
                    <input type ="date" id="ngay">

                </div>
                <div class ="form-group">
                    <label> Tuyến Đường </label>
                    <input type ="text" id="tuyen_duong">

                </div>
                <div class = "form-group">
                    <label> Doanh Thu (đ) </label>
                    <input type = "number" id = "doanh_thu">

                </div>
                <div class = "form-group">
                    <label> Chi Phí (đ) </label>
                    <input type = "number" id = "chi_phi">

                </div>
                <div class = "form-group">
                    <label> Ghi Chú </label>
                    <input type ="text" id = "ghi_chu">
                </div>
                <div class="form-group">
                    <label>Ảnh Hóa Đơn</label>
                    <input type="file" id="receipt-camera" class="upload-input" accept="image/*" capture="environment" onchange="previewReceipt(this)">
                    <input type="file" id="receipt-gallery" class="upload-input" accept="image/*" onchange="previewReceipt(this)">
                    <div class="upload-buttons">
                        <button type="button" class="btn-upload" onclick="document.getElementById('receipt-camera').click()">
                            <span class="upload-icon">📷</span>
                            Chụp ảnh
                        </button>
                        <button type="button" class="btn-upload" onclick="document.getElementById('receipt-gallery').click()">
                            <span class="upload-icon">🖼️</span>
                            Chọn từ thư viện
                        </button>
                    </div>
                    <div id="receipt-preview">
                        <img id="receipt-img" src="" alt="Ảnh hóa đơn">
                        <span class="preview-remove" onclick="removeReceipt()">✕ Xóa ảnh</span>
                    </div>
                </div>
                <div class = "form-group">
                    <label> Lương (đ) </label>
                    <input type = 'number' id ="luong_chuyen">
                </div>
                <div class ="form_group">
                    <label> Tạm ứng (đ) </label>
                    <input type ="number" id = "tam_ung">
                </div>
                <div class = "form_group">
                    <label> Hoàn ứng (đ) </label>
                    <input type= "number" id = "hoan_ung">
                </div>
                <button class = "btn" onclick = "submitTrip()">Nhập Chuyến</button>
                <div class = "msg" id="msg"></div>


            </div>
            <div class ="card">
                <h3> Chuyến của tôi</h3>
                <table>
                    <thead>
                        <tr>
                            <th> Ngày</th>
                            <th> Tuyến đường</th>
                            <th> Doanh thu (đ) </th>

                        </tr>
                    </thead>
                    <tbody id="my-trip"></tbody>
                </table>
            </div>
        </div>
        <script>
            const { createClient } = supabase
            const sb = createClient(
                'https://icwmtqfpbefntfxboofr.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imljd210cWZwYmVmbnRmeGJvb2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mzg3NzgsImV4cCI6MjA5MjUxNDc3OH0.N1gsPt4eZav2LL2XDttqlsAB06b1UzXb4bFTMi3K8NM'
            )
            let currentUser = null
            function formatMoney(n) {
                return n.toLocaleString('vi-VN') + 'đ'
            }

            function formatDate(dateStr) {
                if (!dateStr) return ''
                const [y, m, d] = dateStr.split('-')
                return `${d}/${m}/${y.slice(2)}`
            }
            let selectedReceiptFile = null

            function previewReceipt(input) {
                if (!input.files || !input.files[0]) return
                selectedReceiptFile = input.files[0]
                const reader = new FileReader()
                reader.onload = e => {
                    document.getElementById('receipt-img').src = e.target.result
                    document.getElementById('receipt-preview').style.display = 'block'
                }
                reader.readAsDataURL(input.files[0])
            }

            function removeReceipt() {
                document.getElementById('receipt-camera').value = ''
                document.getElementById('receipt-gallery').value = ''
                selectedReceiptFile = null
                document.getElementById('receipt-img').src = ''
                document.getElementById('receipt-preview').style.display = 'none'
            }

            async function uploadReceipt(file, userId) {
                const ext = file.name.split('.').pop() || 'jpg'
                const path = `${userId}/${Date.now()}.${ext}`
                const { error } = await sb.storage.from('receipts').upload(path, file, { upsert: false })
                if (error) throw error
                const { data } = sb.storage.from('receipts').getPublicUrl(path)
                return data.publicUrl
            }

            function showMsg(text, type) {
                const el = document.getElementById('msg')
                el.textContent = text
                el.className = 'msg ' + type
                el.style.display = 'block'
                setTimeout(() => el.style.display = 'none', 3000)

            }
            async function submitTrip() {
                const ngay = document.getElementById('ngay').value
                const tuyen_duong = document.getElementById('tuyen_duong').value
                const doanh_thu = parseInt(document.getElementById('doanh_thu').value)
                const chi_phi = parseInt(document.getElementById('chi_phi').value)
                const ghi_chu = document.getElementById('ghi_chu').value
                const luong_chuyen = parseInt(document.getElementById('luong_chuyen').value)|| 0
                const tam_ung = parseInt(document.getElementById('tam_ung').value) || 0
                const hoan_ung = parseInt(document.getElementById('hoan_ung').value) || 0
                if (!ngay || !tuyen_duong || !doanh_thu || !chi_phi) {
                    showMsg('Bạn chưa nhập đủ thông tin', 'error')
                    return
                }
                let anh_hoa_don = null
                if (selectedReceiptFile) {
                    try {
                        showMsg('Đang upload ảnh...', 'success')
                        anh_hoa_don = await uploadReceipt(selectedReceiptFile, currentUser.id)
                    } catch (e) {
                        showMsg('Lỗi upload ảnh: ' + e.message, 'error')
                        return
                    }
                }
                const {error} = await sb.from('trips').insert({
                    ngay,
                    tuyen_duong,
                    doanh_thu,
                    chi_phi,
                    ghi_chu,
                    tai_xe_id: currentUser.id,
                    luong_chuyen: luong_chuyen,
                    tam_ung: tam_ung,
                    hoan_ung: hoan_ung,
                    anh_hoa_don,
                })
                if (error) {
                    showMsg('loi: ' + error.message, 'error')
                } else {
                    showMsg('Nhập chuyến thành công', 'success')
                    removeReceipt()
                    loadMyTrips()
                }
                }
                async function loadMyTrips() {
                    const {data} = await sb
                    .from('trips')
                    .select('*')
                    .eq('tai_xe_id', currentUser.id)
                    .order('ngay', {ascending: false})
                const tbody = document.getElementById('my-trip')
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3">Chưa có chuyến nào</td></tr>'
                    return

                }
                tbody.innerHTML = data.map(c => `
                <tr>
                    <td>${formatDate(c.ngay)}</td>
                    <td>${c.tuyen_duong}</td>
                    <td style="color:#2ecc71">${formatMoney(c.doanh_thu)}</td>
                    </tr>
                `).join('')
                }
                async function logout() {
                    await sb.auth.signOut()
                    window.location.href = 'bai10.html'
                }
                sb.auth.onAuthStateChange(async (event, session) => {
             if (session) {
                currentUser = session.user
                loadMyTrips()
             } else {
                window.location.href = 'bai10.html'
             }
             } )


        </script>
    </body>
</html>
