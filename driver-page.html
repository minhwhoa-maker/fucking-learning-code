<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title> Driver page</title>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }

            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
                background: #f4f6f9;
                min-height: 100vh;
            }

            .header {
                background: #1565c0;
                color: white;
                padding: 16px 20px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .container {
                padding: 16px;
                max-width: 600px;
                margin: 0 auto;
            }

            .card {
                background: white;
                border-radius: 12px;
                padding: 20px;
                margin-bottom: 16px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            }

            .card h3 {
                margin-bottom: 16px;
                color: #1a1a2e;
                font-size: 15px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .form-group { margin-bottom: 16px; }

            .form-group label {
                display: block;
                margin-bottom: 6px;
                font-weight: 600;
                font-size: 14px;
                color: #555;
            }

            .form-group input {
                width: 100%;
                padding: 12px 14px;
                border: 1.5px solid #e0e0e0;
                border-radius: 8px;
                font-size: 16px;
                color: #1a1a2e;
                transition: border-color 0.2s;
            }

            .form-group input:focus {
                outline: none;
                border-color: #1a1a2e;
            }

            .btn {
                background: #1a1a2e;
                color: white;
                border: none;
                padding: 14px 24px;
                border-radius: 8px;
                cursor: pointer;
                width: 100%;
                font-size: 16px;
                font-weight: 600;
                transition: background 0.2s;
            }

            .btn:hover { background: #2d2d4a; }

            .btn-logout {
                background: transparent;
                width: auto;
                padding: 8px 16px;
                border: 1.5px solid rgba(255, 255, 255, 0.6);
                font-size: 14px;
                border-radius: 6px;
            }

            .btn-logout:hover { background: rgba(255, 255, 255, 0.1); }

            .msg {
                padding: 12px 14px;
                border-radius: 8px;
                margin-top: 12px;
                display: none;
                font-size: 14px;
            }

            .msg.success { background: #e8f5e9; color: #2e7d32; }
            .msg.error { background: #fdecea; color: #c62828; }

            table { width: 100%; border-collapse: collapse; }

            th {
                text-align: left;
                padding: 12px;
                background: #f4f6f9;
                color: #1a1a2e;
                font-size: 13px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            td {
                padding: 12px;
                border-bottom: 1px solid #f0f0f0;
                color: #444;
                font-size: 14px;
            }

            tr:last-child td { border-bottom: none; }

            @media (min-width: 480px) {
                .container { padding: 24px; }
                .card { padding: 24px; }
            }
        </style>

    </head>
    <body>
        <div class ="header">
            <h2> 🚛 Driver Page </h2>
            <button class="btn btn-logout" onclick ="logout()">Đăng xuất</button>

        </div>
        <div class = "container">
            <div class = "card">
                <h3> Nhập Chuyến</h3>
                <div class ="form-group">
                    <label> Ngày </label>
                    <input type ="date" id="ngay">

                </div>
                <div class ="form-group">
                    <label> Tuyến Đường </label>
                    <input type ="text" id="tuyen_duong">

                </div>
                <div class = "form-group">
                    <label> Doanh Thu (đ) </label>
                    <input type = "number" id = "doanh_thu">

                </div>
                <div class = "form-group">
                    <label> Chi Phí (đ) </label>
                    <input type = "number" id = "chi_phi">

                </div>
                <div class = "form-group">
                    <label> Ghi Chú </label>
                    <input type ="text" id = "ghi_chu">
                </div>
                <div class = "form-group">
                    <label> Lương (đ) </label>
                    <input type = 'number' id ="luong_chuyen">
                </div>
                <div class ="form_group">
                    <label> Tạm ứng (đ) </label>
                    <input type ="number" id = "tam_ung">
                </div>
                <div class = "form_group">
                    <label> Hoàn ứng (đ) </label>
                    <input type= "number" id = "hoan_ung">
                </div>
                <button class = "btn" onclick = "submitTrip()">Nhập Chuyến</button>
                <div class = "msg" id="msg"></div>


            </div>
            <div class ="card">
                <h3> Chuyến của tôi</h3>
                <table>
                    <thead>
                        <tr>
                            <th> Ngày</th>
                            <th> Tuyến đường</th>
                            <th> Doanh thu (đ) </th>

                        </tr>
                    </thead>
                    <tbody id="my-trip"></tbody>
                </table>
            </div>
        </div>
        <script>
            const { createClient } = supabase
            const sb = createClient(
                'https://icwmtqfpbefntfxboofr.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imljd210cWZwYmVmbnRmeGJvb2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mzg3NzgsImV4cCI6MjA5MjUxNDc3OH0.N1gsPt4eZav2LL2XDttqlsAB06b1UzXb4bFTMi3K8NM'
            )
            let currentUser = null
            function formatMoney(n) {
                return n.toLocaleString('vi-VN') + 'đ'
            }

            function formatDate(dateStr) {
                if (!dateStr) return ''
                const [y, m, d] = dateStr.split('-')
                return `${d}/${m}/${y.slice(2)}`
            }
            function showMsg(text, type) {
                const el = document.getElementById('msg')
                el.textContent = text
                el.className = 'msg ' + type
                el.style.display = 'block'
                setTimeout(() => el.style.display = 'none', 3000)

            }
            async function submitTrip() {
                const ngay = document.getElementById('ngay').value
                const tuyen_duong = document.getElementById('tuyen_duong').value
                const doanh_thu = parseInt(document.getElementById('doanh_thu').value)
                const chi_phi = parseInt(document.getElementById('chi_phi').value)
                const ghi_chu = document.getElementById('ghi_chu').value
                const luong_chuyen = parseInt(document.getElementById('luong_chuyen').value)|| 0
                const tam_ung = parseInt(document.getElementById('tam_ung').value) || 0
                const hoan_ung = parseInt(document.getElementById('hoan_ung').value) || 0
                if (!ngay || !tuyen_duong || !doanh_thu || !chi_phi) {
                    showMsg('Bạn chưa nhập đủ thông tin', 'error')
                    return
                }
                const {error} = await sb.from('trips').insert({
                    ngay,
                    tuyen_duong,
                    doanh_thu,
                    chi_phi,
                    ghi_chu,
                    tai_xe_id: currentUser.id,
                    luong_chuyen: luong_chuyen,
                    tam_ung: tam_ung,
                    hoan_ung: hoan_ung,
                })
                if (error) {
                    showMsg('loi: ' + error.message, 'error')

                } else {
                    showMsg('Nhập chuyến thành công', 'success')
                    loadMyTrips()
                }
                }
                async function loadMyTrips() {
                    const {data} = await sb
                    .from('trips')
                    .select('*')
                    .eq('tai_xe_id', currentUser.id)
                    .order('ngay', {ascending: false})
                const tbody = document.getElementById('my-trip')
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3">Chưa có chuyến nào</td></tr>'
                    return

                }
                tbody.innerHTML = data.map(c => `
                <tr>
                    <td>${formatDate(c.ngay)}</td>
                    <td>${c.tuyen_duong}</td>
                    <td style="color:#2ecc71">${formatMoney(c.doanh_thu)}</td>
                    </tr>
                `).join('')
                }
                async function logout() {
                    await sb.auth.signOut()
                    window.location.href = 'bai10.html'
                }
                sb.auth.onAuthStateChange(async (event, session) => {
             if (session) {
                currentUser = session.user
                loadMyTrips()
             } else {
                window.location.href = 'bai10.html'
             }
             } )


        </script>
    </body>
</html>
