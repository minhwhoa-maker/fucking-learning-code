<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Page</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared.js"></script>
</head>
<body>
    <div class="header">
        <h2>🚛 Driver Page</h2>
        <div style="display:flex;gap:10px">
            <button class="btn" onclick="window.location.href='luong-cua-toi.html'">💰 Lương của tôi</button>
            <button class="btn btn-logout" onclick="logout()">Đăng xuất</button>
        </div>
    </div>
    <div class="container">
        <div class="filter-bar">
            <button id="tab-btn-dang-chay" class="btn" onclick="switchTab('dang_chay')">🚛 Đang chạy</button>
            <button id="tab-btn-hoan-thanh" class="btn btn-gray" onclick="switchTab('hoan_thanh')">✅ Hoàn thành</button>
            <button class="btn btn-warning" id="btn-bao-duong" onclick="openMaintenanceModal()" style="display:none">🔧 Báo bảo dưỡng</button>
        </div>

        <!-- Tab: Đang chạy -->
        <div id="panel-dang-chay">
            <div style="margin-bottom:12px">
                <button class="btn btn-success" id="btn-new-trip" onclick="openForm('new-trip')" style="display:none">+ Tạo chuyến mới</button>
            </div>
            <div class="card" data-form-id="new-trip" style="display:none">
                <h3>Tạo chuyến mới</h3>
                <div class="form-group">
                    <label>Tuyến đường</label>
                    <input type="text" id="new-trip-tuyen">
                </div>
                <div class="form-group">
                    <label>Ghi chú</label>
                    <input type="text" id="new-trip-ghi-chu">
                </div>
                <div style="display:flex;gap:8px">
                    <button class="btn" onclick="submitNewTrip()">Tạo chuyến</button>
                    <button class="btn btn-gray" onclick="closeNewTripForm()">Hủy</button>
                </div>
            </div>
            <div id="active-trips"></div>
        </div>

        <!-- Tab: Hoàn thành -->
        <div id="panel-hoan-thanh" style="display:none">
            <div class="table-scroll wide">
                <table>
                    <thead>
                        <tr>
                            <th>Ngày</th>
                            <th>Tuyến đường</th>
                            <th>Doanh thu</th>
                            <th>Chi phí</th>
                            <th>Lợi nhuận</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="completed-trips"></tbody>
                </table>
            </div>
        </div>
    </div>
    <div id="maintenance-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center">
        <div style="background:var(--white);border-radius:var(--radius);padding:24px;width:500px;max-width:95%;max-height:90vh;overflow-y:auto">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                <h3 style="margin:0">🔧 Báo bảo dưỡng</h3>
                <button class="btn btn-gray" onclick="closeMaintenanceModal()">Đóng</button>
            </div>
            <div class="form-group">
                <label>Ngày</label>
                <input type="date" id="maint-ngay">
            </div>
            <div class="form-group">
                <label>Bộ phận</label>
                <input type="text" id="maint-bophan" list="maint-bophan-list" placeholder="vd: lốp trước trái">
                <datalist id="maint-bophan-list"></datalist>
            </div>
            <div class="form-group">
                <label>Loại</label>
                <select id="maint-loai" style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;color:#1a1a2e;background:white">
                    <option value="hong_hoc">Hỏng hóc</option>
                    <option value="linh_kien">Linh kiện</option>
                    <option value="lop_xe">Lốp xe</option>
                    <option value="dinh_ky">Định kỳ</option>
                </select>
            </div>
            <div class="form-group">
                <label>Mô tả</label>
                <input type="text" id="maint-mota">
            </div>
            <div class="form-group">
                <label>Chi phí</label>
                <input type="text" id="maint-chiphi" placeholder="Chi phí (VNĐ)">
            </div>
            <div class="form-group">
                <label>Ảnh hóa đơn</label>
                <input type="file" accept="image/*" capture="environment" class="upload-input" id="maint-camera-input" onchange="handleMaintFileSelect(this)">
                <input type="file" accept="image/*" class="upload-input" id="maint-gallery-input" onchange="handleMaintFileSelect(this)">
                <div class="upload-buttons">
                    <button type="button" class="btn-upload" onclick="document.getElementById('maint-camera-input').click()"><span class="upload-icon">📷</span> Chụp ảnh</button>
                    <button type="button" class="btn-upload" onclick="document.getElementById('maint-gallery-input').click()"><span class="upload-icon">🖼️</span> Thư viện</button>
                </div>
                <div id="maint-receipt-preview" style="margin-top:12px;display:none">
                    <img id="maint-receipt-preview-img" src="" style="width:100%;max-height:200px;object-fit:cover;border-radius:var(--radius-sm);border:1.5px solid var(--border);display:block">
                    <span class="preview-remove" onclick="clearMaintReceipt()">✕ Xóa ảnh</span>
                </div>
            </div>
            <div style="display:flex;gap:8px;margin-top:16px">
                <button class="btn" id="btn-maint-submit" onclick="submitMaintenance()">Lưu</button>
                <button class="btn btn-gray" onclick="closeMaintenanceModal()">Hủy</button>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
    function showToast(msg, type = '') {
        const t = document.getElementById('toast')
        t.textContent = msg
        t.className = 'toast show ' + type
        setTimeout(() => t.className = 'toast', 3000)
    }

    const sb = createSb()
    let currentUser = null
    let currentProfileId = null
    let currentDriverName = ''
    let currentOwnerId = null
    let currentBienSo = ''
    let currentXeId = null
    let activeFormId = null
    let activeReceiptFile = null
    let maintReceiptFile = null
    let maintChiPhiInitialized = false

    const EXPENSE_TYPES = {
        xang:   '⛽ Xăng',
        bai_xe: '🅿️ Bãi xe',
        khac:   '📦 Khác'
    }

    // ── Tab ──────────────────────────────────────────────────────────
    function switchTab(tab) {
        const isDang = tab === 'dang_chay'
        document.getElementById('panel-dang-chay').style.display = isDang ? 'block' : 'none'
        document.getElementById('panel-hoan-thanh').style.display = isDang ? 'none' : 'block'
        document.getElementById('tab-btn-dang-chay').className = isDang ? 'btn' : 'btn btn-gray'
        document.getElementById('tab-btn-hoan-thanh').className = isDang ? 'btn btn-gray' : 'btn'
        if (!isDang) loadCompletedTrips()
    }

    // ── Form management ───────────────────────────────────────────────
    function openForm(formId) {
        if (activeFormId !== null) {
            const oldForm = document.querySelector(`[data-form-id="${activeFormId}"]`)
            if (oldForm) oldForm.style.display = 'none'
            activeReceiptFile = null
            activeFormId = null
        }
        activeFormId = formId
        const form = document.querySelector(`[data-form-id="${formId}"]`)
        if (form) form.style.display = 'block'
    }

    function closeActiveForm() {
        if (activeFormId !== null) {
            const form = document.querySelector(`[data-form-id="${activeFormId}"]`)
            if (form) form.style.display = 'none'
            activeReceiptFile = null
            activeFormId = null
        }
    }

    function closeNewTripForm() {
        document.getElementById('new-trip-tuyen').value = ''
        document.getElementById('new-trip-ghi-chu').value = ''
        closeActiveForm()
    }

    // ── Upload ────────────────────────────────────────────────────────
    async function uploadReceipt(file, userId) {
        const ext = (file.name.split('.').pop() || 'jpg').replace(/[^a-z0-9]/gi, '') || 'jpg'
        const path = `${userId}/${Date.now()}.${ext}`
        const { error } = await sb.storage.from('receipts').upload(path, file, { upsert: false })
        if (error) throw error
        const { data } = sb.storage.from('receipts').getPublicUrl(path)
        return data.publicUrl
    }

    function handleFileSelect(input) {
        if (!input.files || !input.files[0]) return
        activeReceiptFile = input.files[0]
        const reader = new FileReader()
        reader.onload = e => {
            const form = document.querySelector(`[data-form-id="${activeFormId}"]`)
            if (!form) return
            const img = form.querySelector('.receipt-preview-img')
            const preview = form.querySelector('.receipt-preview')
            if (img) img.src = e.target.result
            if (preview) preview.style.display = 'block'
        }
        reader.readAsDataURL(activeReceiptFile)
    }

    // Builds a reusable upload group. onRemove() is called when user removes photo.
    function buildUploadGroup(onRemove) {
        const group = document.createElement('div')
        group.className = 'form-group'

        const label = document.createElement('label')
        label.textContent = 'Ảnh hóa đơn'

        const cameraInput = document.createElement('input')
        cameraInput.type = 'file'
        cameraInput.accept = 'image/*'
        cameraInput.setAttribute('capture', 'environment')
        cameraInput.className = 'upload-input'
        cameraInput.onchange = e => handleFileSelect(e.target)

        const galleryInput = document.createElement('input')
        galleryInput.type = 'file'
        galleryInput.accept = 'image/*'
        galleryInput.className = 'upload-input'
        galleryInput.onchange = e => handleFileSelect(e.target)

        const uploadBtns = document.createElement('div')
        uploadBtns.className = 'upload-buttons'

        const btnCam = document.createElement('button')
        btnCam.type = 'button'
        btnCam.className = 'btn-upload'
        btnCam.innerHTML = '<span class="upload-icon">📷</span> Chụp ảnh'
        btnCam.onclick = () => cameraInput.click()

        const btnGal = document.createElement('button')
        btnGal.type = 'button'
        btnGal.className = 'btn-upload'
        btnGal.innerHTML = '<span class="upload-icon">🖼️</span> Thư viện'
        btnGal.onclick = () => galleryInput.click()

        uploadBtns.append(btnCam, btnGal)

        const preview = document.createElement('div')
        preview.className = 'receipt-preview'
        preview.style.marginTop = '12px'
        preview.style.display = 'none'

        const previewImg = document.createElement('img')
        previewImg.className = 'receipt-preview-img'
        previewImg.style.cssText = 'width:100%;max-height:200px;object-fit:cover;border-radius:var(--radius-sm);border:1.5px solid var(--border);display:block'

        const removeSpan = document.createElement('span')
        removeSpan.className = 'preview-remove'
        removeSpan.textContent = '✕ Xóa ảnh'
        removeSpan.onclick = () => {
            cameraInput.value = ''
            galleryInput.value = ''
            activeReceiptFile = null
            previewImg.src = ''
            preview.style.display = 'none'
            if (onRemove) onRemove()
        }

        preview.append(previewImg, removeSpan)
        group.append(label, cameraInput, galleryInput, uploadBtns, preview)
        return group
    }

    function notifyOwner(type, payload) {
        console.log('notifyOwner', type, currentOwnerId)
        if (!currentOwnerId) return
        fetch('/api/notify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ owner_id: currentOwnerId, type, payload })
        }).catch(() => {})
    }

    // ── New Trip ──────────────────────────────────────────────────────
    async function submitNewTrip() {
        const tuyen_duong = document.getElementById('new-trip-tuyen').value.trim()
        const ghi_chu = document.getElementById('new-trip-ghi-chu').value.trim()
        if (!tuyen_duong) { showToast('Vui lòng nhập tuyến đường', 'error'); return }
        const form = document.querySelector('[data-form-id="new-trip"]')
        const btn = form.querySelector('.btn')
        btn.disabled = true
        showToast('Đang lấy vị trí GPS...')
        let loc
        try { loc = await getLocation() }
        catch (e) { showToast(e.message, 'error'); btn.disabled = false; return }
        const { data: newTrip, error } = await sb.from('trips').insert({
            owner_id: currentOwnerId,
            tuyen_duong, ghi_chu: ghi_chu || null,
            doanh_thu: 0, chi_phi: 0,
            trang_thai: 'dang_chay',
            ngay_bat_dau: new Date().toISOString(),
            tai_xe_id: currentProfileId,
            xe_id: currentXeId,
            lat_bat_dau: loc.lat, lng_bat_dau: loc.lng
        }).select('id').single()
        btn.disabled = false
        if (error) { showToast('Lỗi: ' + error.message, 'error'); return }
        document.getElementById('new-trip-tuyen').value = ''
        document.getElementById('new-trip-ghi-chu').value = ''
        closeActiveForm()
        showToast('Tạo chuyến thành công', 'success')
        notifyOwner('new_trip', { driver_name: currentDriverName, bien_so: currentBienSo, tuyen_duong, trip_id: newTrip?.id })
        loadActiveTrips()
    }

    // ── Active Trips ──────────────────────────────────────────────────
    async function loadActiveTrips() {
        const { data, error } = await sb
            .from('trips').select('*')
            .eq('owner_id', currentOwnerId)
            .eq('tai_xe_id', currentProfileId)
            .eq('trang_thai', 'dang_chay')
            .order('ngay_bat_dau', { ascending: false })
        const container = document.getElementById('active-trips')
        container.textContent = ''
        if (error) { showToast('Lỗi tải chuyến: ' + error.message, 'error'); return }
        if (!data || data.length === 0) {
            const p = document.createElement('p')
            p.textContent = 'Chưa có chuyến nào đang chạy'
            p.style.color = 'var(--text-muted)'
            container.appendChild(p)
            return
        }
        for (const trip of data) {
            const card = await buildTripCard(trip)
            container.appendChild(card)
        }
    }

    async function buildTripCard(trip) {
        const card = document.createElement('div')
        card.className = 'card'
        card.dataset.tripId = trip.id
        card.dataset.tuyenDuong = trip.tuyen_duong || ''

        const title = document.createElement('div')
        title.style.cssText = 'font-weight:700;font-size:1.05em;margin-bottom:4px'
        title.textContent = trip.tuyen_duong || ''

        const startEl = document.createElement('div')
        startEl.style.cssText = 'color:var(--text-muted);font-size:0.9em;margin-bottom:4px'
        startEl.textContent = 'Bắt đầu: ' + formatDate(trip.ngay_bat_dau)

        const chiPhiEl = document.createElement('div')
        chiPhiEl.id = 'chi-phi-' + trip.id
        chiPhiEl.style.cssText = 'color:var(--danger);margin-bottom:10px;font-weight:600'
        chiPhiEl.textContent = 'Tổng chi phí: ' + formatMoney(trip.chi_phi)

        const btnBar = document.createElement('div')
        btnBar.style.cssText = 'display:flex;gap:8px;margin-bottom:8px'

        const btnAddExp = document.createElement('button')
        btnAddExp.className = 'btn btn-warning btn-sm'
        btnAddExp.style.flex = '1'
        btnAddExp.textContent = '➕ Thêm chi phí'
        btnAddExp.onclick = () => openForm('add-' + trip.id)

        const btnComplete = document.createElement('button')
        btnComplete.className = 'btn btn-success btn-sm'
        btnComplete.style.flex = '1'
        btnComplete.textContent = '✓ Hoàn thành'
        btnComplete.onclick = () => {
            const overlay = document.createElement('div')
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;justify-content:center;align-items:center;padding:16px'
            const box = document.createElement('div')
            box.style.cssText = 'background:white;border-radius:var(--radius);padding:24px;max-width:340px;width:100%;box-shadow:var(--shadow)'
            const msg = document.createElement('p')
            msg.style.cssText = 'margin:0 0 20px;font-size:1em;line-height:1.5'
            msg.textContent = `Bác tài có chắc muốn hoàn thành chuyến "${trip.tuyen_duong}" không?`
            const modalBtnRow = document.createElement('div')
            modalBtnRow.style.cssText = 'display:flex;gap:8px'
            const btnYes = document.createElement('button')
            btnYes.className = 'btn btn-success'
            btnYes.style.flex = '1'
            btnYes.textContent = 'Có, hoàn thành'
            btnYes.onclick = () => { overlay.remove(); openForm('complete-' + trip.id) }
            const btnNo = document.createElement('button')
            btnNo.className = 'btn btn-gray'
            btnNo.style.flex = '1'
            btnNo.textContent = 'Chưa, quay lại'
            btnNo.onclick = () => overlay.remove()
            modalBtnRow.append(btnYes, btnNo)
            box.append(msg, modalBtnRow)
            overlay.appendChild(box)
            document.body.appendChild(overlay)
        }

        btnBar.append(btnAddExp, btnComplete)

        const expenseList = document.createElement('div')
        expenseList.id = 'expenses-' + trip.id

        const { data: xeConfig } = await sb.from('xe').select('cach_tinh_luong, gia_tri_luong').eq('id', currentXeId).maybeSingle()
        const addExpForm = buildAddExpenseForm(trip.id)
        const completeForm = buildCompleteForm(trip.id, xeConfig)

        card.append(title, startEl, chiPhiEl, btnBar, expenseList, addExpForm, completeForm)
        loadExpenses(trip.id)
        return card
    }

    // ── Money hint ────────────────────────────────────────────────────
    function numberToVietnamese(n) {
        if (n === 0) return 'không đồng'
        const UNITS = ['', 'một', 'hai', 'ba', 'bốn', 'năm', 'sáu', 'bảy', 'tám', 'chín']
        function readTens(t, u) {
            if (t === 1) return 'mười' + (u > 0 ? ' ' + (u === 5 ? 'lăm' : UNITS[u]) : '')
            return UNITS[t] + ' mươi' + (u > 0 ? ' ' + (u === 1 ? 'mốt' : u === 5 ? 'lăm' : UNITS[u]) : '')
        }
        function readThreeDigits(n) {
            if (n === 0) return ''
            const h = Math.floor(n / 100)
            const t = Math.floor((n % 100) / 10)
            const u = n % 10
            if (h > 0) {
                let r = UNITS[h] + ' trăm'
                if (t === 0 && u > 0) r += ' lẻ ' + UNITS[u]
                else if (t > 0) r += ' ' + readTens(t, u)
                return r
            }
            return t > 0 ? readTens(t, u) : UNITS[u]
        }
        const ty = Math.floor(n / 1_000_000_000)
        const trieu = Math.floor((n % 1_000_000_000) / 1_000_000)
        const nghin = Math.floor((n % 1_000_000) / 1_000)
        const remainder = n % 1_000
        const parts = []
        if (ty > 0) parts.push(readThreeDigits(ty) + ' tỷ')
        if (trieu > 0) parts.push(readThreeDigits(trieu) + ' triệu')
        if (nghin > 0) parts.push(readThreeDigits(nghin) + ' nghìn')
        if (remainder > 0) parts.push(readThreeDigits(remainder))
        const result = parts.join(' ') + ' đ'; return result.charAt(0).toUpperCase() + result.slice(1)
    }

    function addMoneyHint(input) {
        const hint = document.createElement('small')
        hint.style.cssText = 'color:var(--primary);font-size:0.85em;margin-top:4px;display:block;min-height:1.2em'
        input.type = 'text'
        input.addEventListener('input', () => {
            const pos = input.selectionStart
            const oldVal = input.value
            let digitsBefore = 0
            for (let i = 0; i < pos; i++) {
                if (/\d/.test(oldVal[i])) digitsBefore++
            }
            const raw = input.value.replace(/\D/g, '')
            input.dataset.rawValue = raw
            const formatted = raw ? raw.replace(/\B(?=(\d{3})+(?!\d))/g, '.') : ''
            input.value = formatted
            let count = 0
            let newPos = formatted.length
            for (let i = 0; i < formatted.length; i++) {
                if (/\d/.test(formatted[i])) count++
                if (count === digitsBefore) { newPos = i + 1; break }
            }
            input.setSelectionRange(newPos, newPos)
            const n = Number(raw)
            hint.textContent = (raw && Number.isFinite(n)) ? numberToVietnamese(n) : ''
        })
        input.insertAdjacentElement('afterend', hint)
        return hint
    }

    // ── Add Expense Form ──────────────────────────────────────────────
    function buildAddExpenseForm(tripId) {
        const wrap = document.createElement('div')
        wrap.setAttribute('data-form-id', 'add-' + tripId)
        wrap.style.cssText = 'display:none;border-top:1px solid var(--border);padding-top:12px;margin-top:4px'

        const h4 = document.createElement('h4')
        h4.style.cssText = 'margin-bottom:10px;color:var(--primary)'
        h4.textContent = 'Thêm chi phí'

        const loaiGroup = document.createElement('div')
        loaiGroup.className = 'form-group'
        const loaiLabel = document.createElement('label')
        loaiLabel.textContent = 'Loại'
        const loaiSelect = document.createElement('select')
        loaiSelect.setAttribute('data-field', 'loai')
        loaiSelect.style.cssText = 'width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;color:#1a1a2e;background:white'
        Object.entries(EXPENSE_TYPES).forEach(([val, text]) => {
            const opt = document.createElement('option')
            opt.value = val
            opt.textContent = text
            loaiSelect.appendChild(opt)
        })
        loaiGroup.append(loaiLabel, loaiSelect)

        const soTienGroup = document.createElement('div')
        soTienGroup.className = 'form-group'
        const soTienLabel = document.createElement('label')
        soTienLabel.textContent = 'Số tiền (đ)'
        const soTienInput = document.createElement('input')
        soTienInput.type = 'number'
        soTienInput.setAttribute('data-field', 'so_tien')
        soTienGroup.append(soTienLabel, soTienInput)
        addMoneyHint(soTienInput)

        const moTaGroup = document.createElement('div')
        moTaGroup.className = 'form-group'
        const moTaLabel = document.createElement('label')
        moTaLabel.textContent = 'Mô tả'
        const moTaInput = document.createElement('input')
        moTaInput.type = 'text'
        moTaInput.setAttribute('data-field', 'mo_ta')
        moTaGroup.append(moTaLabel, moTaInput)

        const uploadGroup = buildUploadGroup(null)

        const btnRow = document.createElement('div')
        btnRow.style.cssText = 'display:flex;gap:8px;margin-top:4px'
        const btnSave = document.createElement('button')
        btnSave.className = 'btn'
        btnSave.textContent = 'Lưu chi phí'
        btnSave.onclick = () => submitAddExpense(tripId)
        const btnCancel = document.createElement('button')
        btnCancel.className = 'btn btn-gray'
        btnCancel.textContent = 'Hủy'
        btnCancel.onclick = closeActiveForm
        btnRow.append(btnSave, btnCancel)

        wrap.append(h4, loaiGroup, soTienGroup, moTaGroup, uploadGroup, btnRow)
        return wrap
    }

    async function submitAddExpense(tripId) {
        const form = document.querySelector(`[data-form-id="add-${tripId}"]`)
        const loai = form.querySelector('[data-field="loai"]').value
        const soTienEl = form.querySelector('[data-field="so_tien"]')
        const soTienVal = soTienEl.dataset.rawValue || soTienEl.value
        const mo_ta = form.querySelector('[data-field="mo_ta"]').value.trim()
        const so_tien = Number(soTienVal)
        if (!soTienVal || !Number.isFinite(so_tien) || so_tien < 0) {
            showToast('Vui lòng nhập số tiền hợp lệ', 'error')
            return
        }
        const btnSave = form.querySelector('.btn')
        showToast('Đang lấy vị trí GPS...')
        btnSave.disabled = true
        let loc
        try {
            loc = await getLocation()
        } catch (e) {
            showToast(e.message, 'error')
            btnSave.disabled = false
            return
        }
        let anh_url = null
        if (activeReceiptFile) {
            try {
                showToast('Đang upload ảnh...')
                anh_url = await uploadReceipt(activeReceiptFile, currentProfileId)
            } catch (e) {
                showToast('Lỗi upload ảnh: ' + e.message, 'error')
                btnSave.disabled = false
                return
            }
        }
        const { error } = await sb.from('chi_phi_chuyen').insert({
            trip_id: tripId, loai, mo_ta: mo_ta || null, so_tien, anh_url,
            lat: loc.lat, lng: loc.lng
        })
        if (error) { showToast('Lỗi: ' + error.message, 'error'); return }
        form.querySelector('[data-field="so_tien"]').value = ''
        form.querySelector('[data-field="mo_ta"]').value = ''
        closeActiveForm()
        btnSave.disabled = false
        showToast('Đã thêm chi phí', 'success')
        notifyOwner('expense', { driver_name: currentDriverName, bien_so: currentBienSo, loai: EXPENSE_TYPES[loai], so_tien: formatMoney(so_tien), trip_id: tripId })
        await reloadTripChiPhi(tripId)
        await loadExpenses(tripId)
    }

    // ── Expenses ──────────────────────────────────────────────────────
    async function loadExpenses(tripId) {
        const { data, error } = await sb
            .from('chi_phi_chuyen').select('*')
            .eq('trip_id', tripId)
            .order('created_at', { ascending: true })
        if (!error) renderExpenses(tripId, data || [])
    }

    function renderExpenses(tripId, expenses) {
        const container = document.getElementById('expenses-' + tripId)
        if (!container) return
        container.textContent = ''
        expenses.forEach(exp => {
            const typeLabel = EXPENSE_TYPES[exp.loai] || exp.loai || ''
            const icon = typeLabel.split(' ')[0] || ''

            const row = document.createElement('div')
            row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0f0f0;flex-wrap:wrap'

            const iconEl = document.createElement('span')
            iconEl.textContent = icon

            const descEl = document.createElement('span')
            descEl.style.flex = '1'
            descEl.textContent = exp.mo_ta || typeLabel.replace(/^\S+\s?/, '')

            const amountEl = document.createElement('span')
            amountEl.style.cssText = 'color:var(--danger);font-weight:600'
            amountEl.textContent = formatMoney(exp.so_tien)

            const actions = document.createElement('div')
            actions.style.cssText = 'display:flex;gap:4px;align-items:center'

            if (exp.anh_url) {
                const photoLink = document.createElement('a')
                photoLink.href = exp.anh_url
                photoLink.target = '_blank'
                photoLink.textContent = '📷'
                photoLink.style.textDecoration = 'none'
                actions.appendChild(photoLink)
            }

            if (exp.lat && exp.lng) {
                const gpsBtn = document.createElement('a')
                gpsBtn.href = `https://www.google.com/maps?q=${exp.lat},${exp.lng}`
                gpsBtn.target = '_blank'
                gpsBtn.textContent = '📍'
                gpsBtn.style.textDecoration = 'none'
                actions.appendChild(gpsBtn)
            }

            const editBtn = document.createElement('button')
            editBtn.className = 'btn btn-sm btn-gray'
            editBtn.textContent = '✏️'
            editBtn.onclick = () => openForm('edit-' + exp.id)

            const delBtn = document.createElement('button')
            delBtn.className = 'btn btn-sm btn-danger'
            delBtn.textContent = '🗑️'
            delBtn.onclick = () => deleteExpense(exp.id, tripId)

            actions.append(editBtn, delBtn)
            row.append(iconEl, descEl, amountEl, actions)

            const editForm = buildEditExpenseForm(exp, tripId)
            container.append(row, editForm)
        })
    }

    function buildEditExpenseForm(exp, tripId) {
        const wrap = document.createElement('div')
        wrap.setAttribute('data-form-id', 'edit-' + exp.id)
        wrap.dataset.photoRemoved = 'false'
        wrap.style.cssText = 'display:none;background:var(--bg);padding:12px;border-radius:var(--radius-sm);margin:4px 0'

        const loaiGroup = document.createElement('div')
        loaiGroup.className = 'form-group'
        const loaiLabel = document.createElement('label')
        loaiLabel.textContent = 'Loại'
        const loaiSelect = document.createElement('select')
        loaiSelect.setAttribute('data-field', 'loai')
        loaiSelect.style.cssText = 'width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;color:#1a1a2e;background:white'
        Object.entries(EXPENSE_TYPES).forEach(([val, text]) => {
            const opt = document.createElement('option')
            opt.value = val
            opt.textContent = text
            if (val === exp.loai) opt.selected = true
            loaiSelect.appendChild(opt)
        })
        loaiGroup.append(loaiLabel, loaiSelect)

        const soTienGroup = document.createElement('div')
        soTienGroup.className = 'form-group'
        const soTienLabel = document.createElement('label')
        soTienLabel.textContent = 'Số tiền (đ)'
        const soTienInput = document.createElement('input')
        soTienInput.type = 'number'
        soTienInput.value = exp.so_tien ? Number(exp.so_tien).toLocaleString('vi-VN').replace(/\./g, '.') : ''
        soTienInput.dataset.rawValue = exp.so_tien || ''
        soTienInput.setAttribute('data-field', 'so_tien')
        soTienGroup.append(soTienLabel, soTienInput)
        const soTienHint = addMoneyHint(soTienInput)
        if (soTienInput.dataset.rawValue) soTienHint.textContent = numberToVietnamese(Number(soTienInput.dataset.rawValue))

        const moTaGroup = document.createElement('div')
        moTaGroup.className = 'form-group'
        const moTaLabel = document.createElement('label')
        moTaLabel.textContent = 'Mô tả'
        const moTaInput = document.createElement('input')
        moTaInput.type = 'text'
        moTaInput.value = exp.mo_ta || ''
        moTaInput.setAttribute('data-field', 'mo_ta')
        moTaGroup.append(moTaLabel, moTaInput)

        const uploadGroup = buildUploadGroup(() => { wrap.dataset.photoRemoved = 'true' })
        if (exp.anh_url) {
            const preview = uploadGroup.querySelector('.receipt-preview')
            const img = uploadGroup.querySelector('.receipt-preview-img')
            if (preview && img) { img.src = exp.anh_url; preview.style.display = 'block' }
        }

        const btnRow = document.createElement('div')
        btnRow.style.cssText = 'display:flex;gap:8px;margin-top:4px'
        const btnSave = document.createElement('button')
        btnSave.className = 'btn'
        btnSave.textContent = 'Lưu'
        btnSave.onclick = () => submitEditExpense(exp.id, exp.anh_url, tripId)
        const btnCancel = document.createElement('button')
        btnCancel.className = 'btn btn-gray'
        btnCancel.textContent = 'Hủy'
        btnCancel.onclick = closeActiveForm
        btnRow.append(btnSave, btnCancel)

        wrap.append(loaiGroup, soTienGroup, moTaGroup, uploadGroup, btnRow)
        return wrap
    }

    async function submitEditExpense(expenseId, currentAnhUrl, tripId) {
        const form = document.querySelector(`[data-form-id="edit-${expenseId}"]`)
        const loai = form.querySelector('[data-field="loai"]').value
        const soTienEl = form.querySelector('[data-field="so_tien"]')
        const soTienVal = soTienEl.dataset.rawValue || soTienEl.value
        const mo_ta = form.querySelector('[data-field="mo_ta"]').value.trim()
        const so_tien = Number(soTienVal)
        if (!soTienVal || !Number.isFinite(so_tien) || so_tien < 0) {
            showToast('Vui lòng nhập số tiền hợp lệ', 'error')
            return
        }
        let anh_url = currentAnhUrl
        if (activeReceiptFile) {
            try {
                showToast('Đang upload ảnh...')
                anh_url = await uploadReceipt(activeReceiptFile, currentProfileId)
            } catch (e) {
                showToast('Lỗi upload ảnh: ' + e.message, 'error')
                return
            }
        } else if (form.dataset.photoRemoved === 'true') {
            anh_url = null
        }
        const { error } = await sb.from('chi_phi_chuyen')
            .update({ loai, mo_ta: mo_ta || null, so_tien, anh_url })
            .eq('id', expenseId)
        if (error) { showToast('Lỗi: ' + error.message, 'error'); return }
        closeActiveForm()
        showToast('Đã cập nhật chi phí', 'success')
        await reloadTripChiPhi(tripId)
        await loadExpenses(tripId)
    }

    async function deleteExpense(expenseId, tripId) {
        if (!confirm('Xóa chi phí này?')) return
        const { error } = await sb.from('chi_phi_chuyen').delete().eq('id', expenseId)
        if (error) { showToast('Lỗi: ' + error.message, 'error'); return }
        showToast('Đã xóa chi phí', 'success')
        await reloadTripChiPhi(tripId)
        await loadExpenses(tripId)
    }

    async function reloadTripChiPhi(tripId) {
        const { data } = await sb.from('trips').select('chi_phi').eq('id', tripId).single()
        const el = document.getElementById('chi-phi-' + tripId)
        if (el && data) el.textContent = 'Tổng chi phí: ' + formatMoney(data.chi_phi)
    }

    // ── Complete Form ─────────────────────────────────────────────────
    function calcLuongChuyen(xeConfig, doanhThu) {
        if (!xeConfig) return 0
        if (xeConfig.cach_tinh_luong === 'khoan_chuyen') return xeConfig.gia_tri_luong || 0
        if (xeConfig.cach_tinh_luong === 'phan_tram_doanh_thu') return Math.round((doanhThu || 0) * (xeConfig.gia_tri_luong || 0) / 100)
        return 0
    }

    function buildCompleteForm(tripId, xeConfig) {
        const wrap = document.createElement('div')
        wrap.setAttribute('data-form-id', 'complete-' + tripId)
        wrap.style.cssText = 'display:none;border-top:1px solid var(--border);padding-top:12px;margin-top:4px'

        const h4 = document.createElement('h4')
        h4.style.cssText = 'margin-bottom:10px;color:var(--primary)'
        h4.textContent = 'Xác nhận hoàn thành chuyến'

        function field(labelText, fieldName) {
            const g = document.createElement('div')
            g.className = 'form-group'
            const l = document.createElement('label')
            l.textContent = labelText
            const i = document.createElement('input')
            i.type = 'number'
            i.setAttribute('data-field', fieldName)
            g.append(l, i)
            const MONEY_FIELDS = ['doanh_thu', 'tam_ung', 'hoan_ung']
            if (MONEY_FIELDS.includes(fieldName)) addMoneyHint(i)
            return g
        }

        const btnRow = document.createElement('div')
        btnRow.style.cssText = 'display:flex;gap:8px;margin-top:4px'
        const btnConfirm = document.createElement('button')
        btnConfirm.className = 'btn btn-success'
        btnConfirm.textContent = 'Xác nhận hoàn thành'
        btnConfirm.onclick = () => submitComplete(tripId, xeConfig)
        const btnCancel = document.createElement('button')
        btnCancel.className = 'btn btn-gray'
        btnCancel.textContent = 'Hủy'
        btnCancel.onclick = closeActiveForm
        btnRow.append(btnConfirm, btnCancel)

        const doanhThuGroup = field('Doanh thu thực tế (đ)', 'doanh_thu')
        const luongPreview = document.createElement('div')
        luongPreview.style.cssText = 'font-size:0.9em;color:var(--text-muted);padding:4px 0 8px'
        const luongPreviewSpan = document.createElement('span')
        luongPreviewSpan.id = 'luong-preview-' + tripId
        luongPreviewSpan.textContent = formatMoney(calcLuongChuyen(xeConfig, 0))
        luongPreview.append('Lương chuyến (tự tính): ', luongPreviewSpan)
        if (xeConfig && xeConfig.cach_tinh_luong === 'phan_tram_doanh_thu') {
            const doanhThuInput = doanhThuGroup.querySelector('[data-field="doanh_thu"]')
            doanhThuInput.addEventListener('input', () => {
                const rawVal = doanhThuInput.dataset.rawValue || doanhThuInput.value.replace(/\./g, '')
                luongPreviewSpan.textContent = formatMoney(calcLuongChuyen(xeConfig, Number(rawVal) || 0))
            })
        }

        wrap.append(
            h4,
            doanhThuGroup,
            luongPreview,
            field('Tạm ứng (đ)', 'tam_ung'),
            field('Hoàn ứng (đ)', 'hoan_ung'),
            btnRow
        )
        return wrap
    }

    async function submitComplete(tripId, xeConfig) {
        const form = document.querySelector(`[data-form-id="complete-${tripId}"]`)
        const dtEl = form.querySelector('[data-field="doanh_thu"]')
        const dtVal = dtEl.dataset.rawValue || dtEl.value
        const doanh_thu = Number(dtVal)
        if (!dtVal || !Number.isFinite(doanh_thu) || doanh_thu < 0) {
            showToast('Vui lòng nhập doanh thu thực tế', 'error')
            return
        }
        const luong_chuyen = calcLuongChuyen(xeConfig, doanh_thu)
        const tam_ung      = Number(form.querySelector('[data-field="tam_ung"]').dataset.rawValue || form.querySelector('[data-field="tam_ung"]').value) || 0
        const hoan_ung     = Number(form.querySelector('[data-field="hoan_ung"]').dataset.rawValue || form.querySelector('[data-field="hoan_ung"]').value) || 0
        const btn = form.querySelector('.btn-success')
        btn.disabled = true
        showToast('Đang lấy vị trí GPS...')
        let loc
        try { loc = await getLocation() }
        catch (e) { showToast(e.message, 'error'); btn.disabled = false; return }
        const { error } = await sb.from('trips').update({
            trang_thai: 'hoan_thanh',
            ngay_ket_thuc: new Date().toISOString(),
            doanh_thu, luong_chuyen, tam_ung, hoan_ung,
            lat_ket_thuc: loc.lat, lng_ket_thuc: loc.lng
        }).eq('id', tripId)
        btn.disabled = false
        if (error) { showToast('Lỗi: ' + error.message, 'error'); return }
        closeActiveForm()
        showToast('Hoàn thành chuyến', 'success')
        const tripCard = document.querySelector(`[data-trip-id="${tripId}"]`)
        notifyOwner('complete', { driver_name: currentDriverName, bien_so: currentBienSo, tuyen_duong: tripCard?.dataset.tuyenDuong || '', trip_id: tripId })
        loadActiveTrips()
    }

    // ── Completed Trips ───────────────────────────────────────────────
    async function loadCompletedTrips() {
        const { data, error } = await sb
            .from('trips').select('*')
            .eq('owner_id', currentOwnerId)
            .eq('tai_xe_id', currentProfileId)
            .eq('trang_thai', 'hoan_thanh')
            .order('ngay_bat_dau', { ascending: false })
        const tbody = document.getElementById('completed-trips')
        tbody.textContent = ''
        if (error) { showToast('Lỗi tải chuyến: ' + error.message, 'error'); return }
        if (!data || data.length === 0) {
            const tr = document.createElement('tr')
            const td = document.createElement('td')
            td.colSpan = 6
            td.textContent = 'Chưa có chuyến hoàn thành'
            td.style.cssText = 'text-align:center;color:var(--text-muted);padding:20px'
            tr.appendChild(td)
            tbody.appendChild(tr)
            return
        }
        data.forEach(trip => {
            const doanhThu = Number(trip.doanh_thu) || 0
            const chiPhi   = Number(trip.chi_phi) || 0
            const loiNhuan = doanhThu - chiPhi
            const tr = document.createElement('tr')
            const cells = [
                formatDate(trip.ngay_bat_dau),
                trip.tuyen_duong || '',
                formatMoney(doanhThu),
                formatMoney(chiPhi),
                formatMoney(loiNhuan)
            ]
            cells.forEach((val, i) => {
                const td = document.createElement('td')
                td.textContent = val
                if (i === 2) td.style.color = 'var(--success)'
                if (i === 3) td.style.color = 'var(--danger)'
                if (i === 4) td.style.color = loiNhuan >= 0 ? 'var(--success)' : 'var(--danger)'
                tr.appendChild(td)
            })
            const tdAction = document.createElement('td')
            const btnDetail = document.createElement('button')
            btnDetail.className = 'btn btn-sm btn-gray'
            btnDetail.textContent = 'Chi tiết'
            btnDetail.onclick = () => { window.location.href = 'trip-detail.html?trip_id=' + trip.id }
            tdAction.appendChild(btnDetail)
            tr.appendChild(tdAction)
            tbody.appendChild(tr)
        })
    }

    // ── Maintenance ───────────────────────────────────────────────────
    const PRESET_PARTS = [
        'Lốp trước trái', 'Lốp trước phải', 'Lốp sau trái', 'Lốp sau phải',
        'Nhớt động cơ', 'Lọc dầu', 'Lọc gió', 'Lọc nhiên liệu',
        'Má phanh trước', 'Má phanh sau', 'Đĩa phanh',
        'Ắc quy', 'Bugi', 'Dây curoa',
        'Đèn pha', 'Đèn hậu', 'Gương chiếu hậu',
        'Thay dầu hộp số', 'Bảo dưỡng điều hòa', 'Đăng kiểm', 'Bảo hiểm'
    ]

    const MAINT_TYPES = {
        hong_hoc: 'Hỏng hóc',
        linh_kien: 'Linh kiện',
        lop_xe: 'Lốp xe',
        dinh_ky: 'Định kỳ'
    }

    function handleMaintFileSelect(input) {
        maintReceiptFile = input.files[0]
        const reader = new FileReader()
        reader.onload = e => {
            document.getElementById('maint-receipt-preview-img').src = e.target.result
            document.getElementById('maint-receipt-preview').style.display = 'block'
        }
        reader.readAsDataURL(maintReceiptFile)
    }

    function clearMaintReceipt() {
        maintReceiptFile = null
        document.querySelectorAll('#maintenance-modal .upload-input').forEach(i => i.value = '')
        document.getElementById('maint-receipt-preview').style.display = 'none'
        document.getElementById('maint-receipt-preview-img').src = ''
    }

    async function openMaintenanceModal() {
        document.getElementById('maint-ngay').value = new Date().toISOString().split('T')[0]
        document.getElementById('maint-bophan').value = ''
        document.getElementById('maint-loai').value = 'hong_hoc'
        document.getElementById('maint-mota').value = ''
        const chiPhiEl = document.getElementById('maint-chiphi')
        chiPhiEl.value = ''
        chiPhiEl.dataset.rawValue = ''
        const nextSib = chiPhiEl.nextElementSibling
        if (nextSib && nextSib.tagName === 'SMALL') nextSib.textContent = ''
        clearMaintReceipt()
        const { data } = await sb.from('bao_duong').select('bo_phan').eq('xe_id', currentXeId)
        const unique = [...new Set([...(data || []).map(d => d.bo_phan).filter(Boolean), ...PRESET_PARTS])]
        const datalist = document.getElementById('maint-bophan-list')
        datalist.textContent = ''
        unique.forEach(item => {
            const opt = document.createElement('option')
            opt.value = item
            datalist.appendChild(opt)
        })
        if (!maintChiPhiInitialized) {
            addMoneyHint(document.getElementById('maint-chiphi'))
            maintChiPhiInitialized = true
        }
        document.getElementById('maintenance-modal').style.display = 'flex'
    }

    function closeMaintenanceModal() {
        document.getElementById('maintenance-modal').style.display = 'none'
        maintReceiptFile = null
    }

    async function submitMaintenance() {
        const ngay = document.getElementById('maint-ngay').value
        const bo_phan = document.getElementById('maint-bophan').value.trim()
        const loai = document.getElementById('maint-loai').value
        const mo_ta = document.getElementById('maint-mota').value.trim()
        const chiPhiEl = document.getElementById('maint-chiphi')
        const chiPhiVal = chiPhiEl.dataset.rawValue || chiPhiEl.value
        const chi_phi = Number(chiPhiVal)
        if (!ngay) { showToast('Vui lòng chọn ngày', 'error'); return }
        if (!bo_phan) { showToast('Vui lòng nhập bộ phận', 'error'); return }
        if (!chiPhiVal || !Number.isFinite(chi_phi) || chi_phi < 0) { showToast('Vui lòng nhập chi phí hợp lệ', 'error'); return }
        const btn = document.getElementById('btn-maint-submit')
        btn.disabled = true
        showToast('Đang lấy vị trí GPS...')
        let loc
        try { loc = await getLocation() }
        catch (e) { showToast(e.message, 'error'); btn.disabled = false; return }
        const { data: activeTrip } = await sb.from('trips').select('id').eq('owner_id', currentOwnerId).eq('tai_xe_id', currentProfileId).eq('trang_thai', 'dang_chay').limit(1).maybeSingle()
        const trip_id = activeTrip?.id || null
        let anh_url = null
        if (maintReceiptFile) {
            try {
                anh_url = await uploadReceipt(maintReceiptFile, currentProfileId)
            } catch (e) {
                showToast('Lỗi upload ảnh: ' + e.message, 'error')
                btn.disabled = false
                return
            }
        }
        const { error } = await sb.from('bao_duong').insert({
            owner_id: currentOwnerId,
            xe_id: currentXeId,
            ngay, loai, bo_phan,
            mo_ta: mo_ta || null,
            chi_phi,
            anh_url: anh_url || null,
            lat: loc.lat, lng: loc.lng,
            nguoi_nhap: 'driver',
            tai_xe_id: currentProfileId,
            trip_id
        })
        btn.disabled = false
        if (error) { showToast('Lỗi: ' + error.message, 'error'); return }
        closeMaintenanceModal()
        showToast('Đã báo bảo dưỡng', 'success')
        notifyOwner('maintenance', {
            driver_name: currentDriverName,
            bien_so: currentBienSo,
            bo_phan,
            chi_phi: formatMoney(chi_phi),
            trip_id
        })
    }

    // ── Auth ──────────────────────────────────────────────────────────
    async function logout() {
        await sb.auth.signOut()
        window.location.href = 'bai10.html'
    }

    async function initPage() {
        const auth = await requireRole(sb, 'driver')
        if (!auth) return
        currentUser = auth.user
        currentProfileId = auth.profile.id
        const { data: u } = await sb.from('users').select('full_name').eq('id', currentProfileId).single()
        currentDriverName = u?.full_name || currentUser.email
        const { data: xe } = await sb.from('xe').select('id, bien_so').eq('tai_xe_id', currentProfileId).maybeSingle()
        currentBienSo = formatBienSo(xe?.bien_so || '') || ''
        currentXeId = xe?.id || null
        if (xe) {
            document.getElementById('btn-new-trip').style.display = ''
            document.getElementById('btn-bao-duong').style.display = ''
        } else {
            const warn = document.createElement('div')
            warn.style.cssText = 'background:#fdecea;border:1.5px solid var(--danger);border-radius:var(--radius);padding:16px;color:var(--danger);margin-bottom:12px;font-size:14px;'
            warn.textContent = 'Bạn chưa được chủ xe chỉ định xe, vui lòng liên hệ chủ xe.'
            const activeTrips = document.getElementById('active-trips')
            activeTrips.parentNode.insertBefore(warn, activeTrips)
        }
        const { data: ownerRow } = await sb.from('users').select('owner_id').eq('id', currentProfileId).single()
        currentOwnerId = ownerRow?.owner_id || null
        loadActiveTrips()
    }

    setupLogoutListener(sb)
    initPage()
    </script>
</body>
</html>
