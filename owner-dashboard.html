<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Owner Dashboard</title>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <link rel="manifest" href="/manifest.json">
        <link rel="stylesheet" href="/style.css">
    </head>
    <body>
        <div class="header">
            <h2>👑 Owner Dashboard</h2>
        </div>
        <div class="container">
            <div class="stat">
                <div class="stat-card">
                    <h3>Doanh thu</h3>
                    <p class="stat-value green" id="tong-doanh-thu">...</p>
                </div>
                <div class="stat-card">
                    <h3>Chi phí</h3>
                    <p class="stat-value red" id="tong-chi-phi">...</p>
                </div>
                <div class="stat-card">
                    <h3>Lợi nhuận</h3>
                    <p class="stat-value blue" id="tong-loi-nhuan">...</p>
                </div>
                <div class="stat-card">
                    <h3>Tổng lương</h3>
                    <p class="stat-value orange" id="tong-luong">...</p>
                </div>
            </div>
            <div class="filter-bar" style="margin-bottom: 20px; display: flex; gap: 12px; align-items: center;">
                <label style="font-weight: bold">Tháng</label>
                <input type="month" id="filter-month" style="padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px;">
                <button onclick="loadTrips()" style="background: #1565c0; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;">Lọc</button>
                <button onclick="clearFilter()" style="background: gray; border: 1px solid #ddd; padding: 8px 16px; border-radius: 6px; cursor: pointer;">Tất cả</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Ngày</th>
                        <th>Tuyến đường</th>
                        <th>Doanh thu</th>
                        <th>Chi phí</th>
                        <th>Lợi nhuận</th>
                        <th>Lương</th>
                        <th> Tạm ứng</th>
                        <th> Hoàn ứng</th>
                        <th> Còn lại</th>
                        <th>Ảnh HĐ</th>
                    </tr>
                </thead>
                <tbody id="report-body">
                    <!-- Dữ liệu sẽ được chèn vào đây -->
                </tbody>
            </table>
            <div id="status-message" hidden></div>
            <button class="btn" onclick="logout()">Đăng xuất</button>
            <button class = "btn" onclick="window.location.href='driver.html'">👥 Tài xế</button>
            
        </div>
        <script>
            const { createClient } = supabase
            const sb = createClient('https://icwmtqfpbefntfxboofr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imljd210cWZwYmVmbnRmeGJvb2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mzg3NzgsImV4cCI6MjA5MjUxNDc3OH0.N1gsPt4eZav2LL2XDttqlsAB06b1UzXb4bFTMi3K8NM')
            const statusMessage = document.getElementById('status-message')

            function toNumber(value) {
                const n = Number(value)
                return Number.isFinite(n) ? n : 0
            }

            function setTotals(totalDT = 0, totalCP = 0, totalluong = 0) {
                const totalLN = totalDT - totalCP
                document.getElementById('tong-doanh-thu').textContent = formatCurrency(totalDT)
                document.getElementById('tong-chi-phi').textContent = formatCurrency(totalCP)
                document.getElementById('tong-loi-nhuan').textContent = formatCurrency(totalLN)
                document.getElementById('tong-luong').textContent = formatCurrency(totalluong)
            }

            function showStatus(message, type) {
                statusMessage.textContent = message
                statusMessage.className = `message ${type}`
                statusMessage.hidden = false
            }

            function hideStatus() {
                statusMessage.hidden = true
                statusMessage.className = ''
                statusMessage.textContent = ''
            }

            function formatCurrency(n) {
                return toNumber(n).toLocaleString('vi-VN') + ' đ'
            }

            function formatDate(dateStr) {
                if (!dateStr) return ''
                const [y, m, d] = dateStr.split('-')
                return `${d}/${m}/${y.slice(2)}`
            }

            async function getUserRole(email) {
                const { data, error } = await sb
                    .from('users')
                    .select('role')
                    .eq('email', email)
                    .maybeSingle()

                if (error) {
                    throw new Error(error.message)
                }

                return data?.role ?? null
            }

            function renderTrips(trips) {
                const tbody = document.getElementById('report-body')
                tbody.innerHTML = ''

                trips.forEach((trip) => {
                    const row = document.createElement('tr')
                    const doanhThu = toNumber(trip.doanh_thu)
                    const chiPhi = toNumber(trip.chi_phi)
                    const loiNhuan = doanhThu - chiPhi
                    const tamUng = toNumber(trip.tam_ung)
                    const hoanUng = toNumber(trip.hoan_ung)
                    const conLai = tamUng - hoanUng

                    const values = [
                        formatDate(trip.ngay),
                        trip.tuyen_duong ?? '',
                        formatCurrency(doanhThu),
                        formatCurrency(chiPhi),
                        formatCurrency(loiNhuan),
                        formatCurrency(toNumber(trip.luong_chuyen)),
                        formatCurrency(tamUng),
                        formatCurrency(hoanUng),
                        formatCurrency(conLai)
                    ]

                    values.forEach((value, index) => {
                        const cell = document.createElement('td')
                        cell.textContent = value
                        if (index === 2) cell.style.color = '#2ecc71'
                        if (index === 3) cell.style.color = '#e74c3c'
                        if (index === 4) cell.style.color = '#3498db'
                        if (index === 6) cell.style.color = '#e67e22'
                        if (index === 7) cell.style.color = '#27ae60'
                        if (index === 8) cell.style.color = conLai > 0 ? '#e74c3c' : '#27ae60'
                        row.appendChild(cell)
                    })

                    const imgCell = document.createElement('td')
                    if (trip.anh_hoa_don) {
                        const link = document.createElement('a')
                        link.href = trip.anh_hoa_don
                        link.target = '_blank'
                        const img = document.createElement('img')
                        img.src = trip.anh_hoa_don
                        img.width = 50
                        img.height = 50
                        img.style.objectFit = 'cover'
                        img.style.borderRadius = '4px'
                        img.style.border = '1px solid #e0e0e0'
                        img.style.cursor = 'pointer'
                        link.appendChild(img)
                        imgCell.appendChild(link)
                    } else {
                        imgCell.textContent = '-'
                        imgCell.style.color = '#aaa'
                        imgCell.style.textAlign = 'center'
                    }
                    row.appendChild(imgCell)

                    tbody.appendChild(row)
                })
            }

            async function loadTrips() {
                let query = sb.from('trips').select('*').order('ngay', { ascending: false })
                const month = document.getElementById('filter-month').value
                if (month) {
                    const start = month + '-01'
                    const end = new Date(month + '-01')
                    end.setMonth(end.getMonth() + 1)
                    const endStr = end.toISOString().split('T')[0]
                    query = query.gte('ngay', start).lt('ngay', endStr)
                }

                const { data, error } = await query
                if (error) {
                    throw new Error(error.message)
                }
                

                const trips = Array.isArray(data) ? data : []
                const totalDT = trips.reduce((sum, c) => sum + toNumber(c.doanh_thu), 0)
                const totalCP = trips.reduce((sum, c) => sum + toNumber(c.chi_phi), 0)
                const totalluong = trips.reduce((sum, c) => sum + toNumber(c.luong_chuyen), 0)
                

                setTotals(totalDT, totalCP, totalluong)

                if (trips.length === 0) {
                    document.getElementById('report-body').innerHTML = ''
                    showStatus('Chưa có dữ liệu chuyến đi', 'empty')
                    return
                }

                hideStatus()
                renderTrips(trips)
            }

            function clearFilter() {
                document.getElementById('filter-month').value = ''
                loadTrips()
            }

            async function checkAccess() {
                const { data: { session }, error } = await sb.auth.getSession()
                if (error || !session?.user?.email) {
                    window.location.href = 'bai10.html'
                    return false
                }

                try {
                    const role = await getUserRole(session.user.email)
                    if (role !== 'owner') {
                        window.location.href = 'bai10.html'
                        return false
                    }
                } catch {
                    window.location.href = 'bai10.html'
                    return false
                }

                return true
            }

            async function initPage() {
                try {
                    setTotals(0, 0)
                    hideStatus()
                    const allowed = await checkAccess()
                    if (!allowed) return
                    await loadTrips()
                    sb.channel('trips-changes')
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'trips' }, payload => {
                            console.log('Change detected:', payload)
                            loadTrips()
                        })
                        .subscribe()
                } catch (err) {
                    console.error('Owner dashboard error:', err)
                    setTotals(0, 0)
                    document.getElementById('report-body').innerHTML = ''
                    showStatus('Không thể tải dữ liệu. Vui lòng thử lại.', 'error')
                }
            }

            async function logout() {
                await sb.auth.signOut()
                window.location.href = 'bai10.html'
            }

            initPage()
        </script>
    </body>
</html>
