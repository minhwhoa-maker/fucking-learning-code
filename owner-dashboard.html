<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Owner Dashboard</title>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <link rel="manifest" href="manifest.json">
        <link rel="stylesheet" href="style.css">
        <script src="shared.js"></script>
    </head>
    <body>
        <div class="header">
            <h2>👑 Owner Dashboard</h2>
            <div style="display:flex; gap: 10px;">
                <button class="btn" onclick="window.location.href='driver.html'">👥 Tài xế</button>
                <button class="btn" onclick="window.location.href='vehicles.html'">🚛 Xe</button>
                <button class="btn btn-logout" onclick="logout()">Đăng xuất</button>
            </div>
        </div>
        <div class="container">
            <div class="stat">
                <div class="stat-card">
                    <h3>Doanh thu</h3>
                    <p class="stat-value green" id="tong-doanh-thu">...</p>
                </div>
                <div class="stat-card">
                    <h3>Chi phí</h3>
                    <p class="stat-value red" id="tong-chi-phi">...</p>
                </div>
                <div class="stat-card">
                    <h3>Lợi nhuận</h3>
                    <p class="stat-value blue" id="tong-loi-nhuan">...</p>
                </div>
                <div class="stat-card">
                    <h3>Tổng lương</h3>
                    <p class="stat-value orange" id="tong-luong">...</p>
                </div>
            </div>
            <div class="filter-bar">
                <label>Tháng</label>
                <input type="month" id="filter-month">
                <button class="btn" onclick="loadTrips()">Lọc</button>
                <button class="btn btn-gray" onclick="clearFilter()">Tất cả</button>
            </div>
            <div class="table-scroll wide">
                <table>
                    <thead>
                        <tr>
                            <th>Ngày</th>
                            <th>Tuyến đường</th>
                            <th>Doanh thu</th>
                            <th>Chi phí</th>
                            <th>Lợi nhuận</th>
                            <th>Lương</th>
                            <th> Tạm ứng</th>
                            <th> Hoàn ứng</th>
                            <th> Còn lại</th>
                            <th>Ảnh HĐ</th>
                        </tr>
                    </thead>
                    <tbody id="report-body">
                        <!-- Dữ liệu sẽ được chèn vào đây -->
                    </tbody>
                </table>
            </div>
            <div id="status-message" hidden></div>
        </div>
        <script>
            function showToast(msg, type = '') {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.className = 'toast show ' + type;
                setTimeout(() => toast.className = 'toast', 3000);
            }
            const sb = createSb()
            const statusMessage = document.getElementById('status-message')
            let tripsChannel = null

            function toNumber(value) {
                const n = Number(value)
                return Number.isFinite(n) ? n : 0
            }

            function setTotals(totalDT = 0, totalCP = 0, totalluong = 0) {
                const totalLN = totalDT - totalCP
                document.getElementById('tong-doanh-thu').textContent = formatMoney(totalDT)
                document.getElementById('tong-chi-phi').textContent = formatMoney(totalCP)
                document.getElementById('tong-loi-nhuan').textContent = formatMoney(totalLN)
                document.getElementById('tong-luong').textContent = formatMoney(totalluong)
            }

            function showStatus(message, type) {
                statusMessage.textContent = message
                statusMessage.className = `message ${type}`
                statusMessage.hidden = false
            }

            function hideStatus() {
                statusMessage.hidden = true
                statusMessage.className = ''
                statusMessage.textContent = ''
            }

            function renderTrips(trips) {
                const tbody = document.getElementById('report-body')
                tbody.textContent = ''

                trips.forEach((trip) => {
                    const row = document.createElement('tr')
                    const doanhThu = toNumber(trip.doanh_thu)
                    const chiPhi = toNumber(trip.chi_phi)
                    const loiNhuan = doanhThu - chiPhi
                    const tamUng = toNumber(trip.tam_ung)
                    const hoanUng = toNumber(trip.hoan_ung)
                    const conLai = tamUng - hoanUng

                    const values = [
                        formatDate(trip.ngay),
                        trip.tuyen_duong ?? '',
                        formatMoney(doanhThu),
                        formatMoney(chiPhi),
                        formatMoney(loiNhuan),
                        formatMoney(toNumber(trip.luong_chuyen)),
                        formatMoney(tamUng),
                        formatMoney(hoanUng),
                        formatMoney(conLai)
                    ]

                    values.forEach((value, index) => {
                        const cell = document.createElement('td')
                        cell.textContent = value
                        if (index === 2) cell.style.color = '#2ecc71'
                        if (index === 3) cell.style.color = '#e74c3c'
                        if (index === 4) cell.style.color = '#3498db'
                        if (index === 6) cell.style.color = '#e67e22'
                        if (index === 7) cell.style.color = '#27ae60'
                        if (index === 8) cell.style.color = conLai > 0 ? '#e74c3c' : '#27ae60'
                        row.appendChild(cell)
                    })

                    const imgCell = document.createElement('td')
                    if (trip.anh_hoa_don) {
                        const link = document.createElement('a')
                        link.href = trip.anh_hoa_don
                        link.target = '_blank'
                        const img = document.createElement('img')
                        img.src = trip.anh_hoa_don
                        img.width = 50
                        img.height = 50
                        img.style.objectFit = 'cover'
                        img.style.borderRadius = '4px'
                        img.style.border = '1px solid #e0e0e0'
                        img.style.cursor = 'pointer'
                        link.appendChild(img)
                        imgCell.appendChild(link)
                    } else {
                        imgCell.textContent = '-'
                        imgCell.style.color = '#aaa'
                        imgCell.style.textAlign = 'center'
                    }
                    row.appendChild(imgCell)

                    tbody.appendChild(row)
                })
            }

            async function loadTrips() {
                let query = sb.from('trips').select('*').order('ngay', { ascending: false })
                const month = document.getElementById('filter-month').value
                if (month) {
                    const start = month + '-01'
                    const end = new Date(month + '-01')
                    end.setMonth(end.getMonth() + 1)
                    const endStr = end.toISOString().split('T')[0]
                    query = query.gte('ngay', start).lt('ngay', endStr)
                }

                const { data, error } = await query
                if (error) {
                    throw new Error(error.message)
                }
                

                const trips = Array.isArray(data) ? data : []
                const totalDT = trips.reduce((sum, c) => sum + toNumber(c.doanh_thu), 0)
                const totalCP = trips.reduce((sum, c) => sum + toNumber(c.chi_phi), 0)
                const totalluong = trips.reduce((sum, c) => sum + toNumber(c.luong_chuyen), 0)
                

                setTotals(totalDT, totalCP, totalluong)

                if (trips.length === 0) {
                    document.getElementById('report-body').textContent = ''
                    showStatus('Chưa có dữ liệu chuyến đi', 'empty')
                    return
                }

                hideStatus()
                renderTrips(trips)
            }

            function clearFilter() {
                document.getElementById('filter-month').value = ''
                loadTrips()
            }

            async function initPage() {
                try {
                    setTotals(0, 0, 0)
                    hideStatus()
                    const auth = await requireRole(sb, 'owner')
                    if (!auth) return
                    await loadTrips()
                    tripsChannel = sb.channel('trips-changes')
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'trips' }, payload => {
                            console.log('Change detected:', payload)
                            loadTrips()
                        })
                        .subscribe()
                } catch (err) {
                    console.error('Owner dashboard error:', err)
                    setTotals(0, 0, 0)
                    document.getElementById('report-body').textContent = ''
                    showStatus('Không thể tải dữ liệu. Vui lòng thử lại.', 'error')
                }
            }

            async function logout() {
                await sb.auth.signOut()
                window.location.href = 'bai10.html'
            }

            setupLogoutListener(sb)
            initPage()
            window.addEventListener('beforeunload', () => {
                if (tripsChannel) sb.removeChannel(tripsChannel)
            })
        </script>
    <div class="toast" id="toast"></div>
    </body>
</html>
