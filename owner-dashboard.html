<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Owner Dashboard</title>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <link rel="manifest" href="manifest.json">
        <link rel="stylesheet" href="style.css">
        <script src="shared.js"></script>
        <style>
            @media (max-width: 600px) {
                #report-body td:nth-child(4),
                #report-body td:nth-child(6),
                table thead tr th:nth-child(4),
                table thead tr th:nth-child(6) {
                    display: none;
                }
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h2>👑 Owner Dashboard</h2>
            <div style="display:flex; gap: 10px;">
                <button class="btn" onclick="window.location.href='driver.html'">👥 Tài xế</button>
                <button class="btn" onclick="window.location.href='vehicles.html'">🚛 Xe</button>
                <button class="btn" onclick="window.location.href='luong-thang.html'">💰 Bảng lương</button>
                <button class="btn" onclick="toggleNotifyPanel()">🔔</button>
                <button class="btn btn-logout" onclick="logout()">Đăng xuất</button>
            </div>
        </div>
        <div id="notify-panel" style="display:none;position:fixed;top:64px;right:16px;z-index:500;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;min-width:260px;">
            <h4 style="margin:0 0 12px;font-size:0.95em">🔔 Cài đặt thông báo</h4>
            <div class="notify-row">
                <span>🚛 Chuyến mới bắt đầu</span>
                <label class="toggle">
                    <input type="checkbox" id="notif-new-trip" onchange="saveNotifySetting('notify_new_trip', this.checked)">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="notify-row">
                <span>✅ Chuyến hoàn thành</span>
                <label class="toggle">
                    <input type="checkbox" id="notif-complete" onchange="saveNotifySetting('notify_complete', this.checked)">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="notify-row">
                <span>💰 Chi phí mới</span>
                <label class="toggle">
                    <input type="checkbox" id="notif-expense" onchange="saveNotifySetting('notify_expense', this.checked)">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="notify-row">
                <span>🔧 Báo bảo dưỡng</span>
                <label class="toggle">
                    <input type="checkbox" id="notif-maintenance" onchange="saveNotifySetting('notify_maintenance', this.checked)">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>
        <div class="container">
            <div class="stat">
                <div class="stat-card">
                    <h3>Doanh thu</h3>
                    <p class="stat-value green" id="tong-doanh-thu">...</p>
                </div>
                <div class="stat-card">
                    <h3>Chi phí</h3>
                    <p class="stat-value red" id="tong-chi-phi">...</p>
                </div>
                <div class="stat-card">
                    <h3>Lợi nhuận</h3>
                    <p class="stat-value blue" id="tong-loi-nhuan">...</p>
                </div>
                <div class="stat-card">
                    <h3>Tổng lương</h3>
                    <p class="stat-value orange" id="tong-luong">...</p>
                </div>
            </div>
            <div class="filter-bar">
                <label>Tháng</label>
                <input type="month" id="filter-month">
                <button class="btn" onclick="loadTrips()">Lọc</button>
                <button class="btn btn-gray" onclick="clearFilter()">Tất cả</button>
            </div>
            <div class="table-scroll wide">
                <table>
                    <thead>
                        <tr>
                            <th>Ngày</th>
                            <th>Tuyến đường</th>
                            <th>Doanh thu</th>
                            <th>Chi phí</th>
                            <th>Lợi nhuận</th>
                            <th>Lương</th>
                            <th>Chi tiết</th>
                        </tr>
                    </thead>
                    <tbody id="report-body">
                        <!-- Dữ liệu sẽ được chèn vào đây -->
                    </tbody>
                </table>
            </div>
            <div id="status-message" hidden></div>
        </div>
        <script>
            function showToast(msg, type = '') {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.className = 'toast show ' + type;
                setTimeout(() => toast.className = 'toast', 3000);
            }
            const sb = createSb()
            const statusMessage = document.getElementById('status-message')
            let tripsChannel = null
            let currentOwnerProfileId = null

            const VAPID_PUBLIC_KEY = 'BJO2an5FL6G-ROpD5_krG8QteQJW2aiTNR-GDEhAh4mMC1rX10gDmMDjaXpUcHTsgAQpzZNVdVUdpwE2XvVr070'

            function urlBase64ToUint8Array(b64) {
                const padding = '='.repeat((4 - b64.length % 4) % 4)
                const base64 = (b64 + padding).replace(/-/g, '+').replace(/_/g, '/')
                const raw = atob(base64)
                return Uint8Array.from([...raw].map(c => c.charCodeAt(0)))
            }

            async function setupPushNotifications(userId) {
                if (!('serviceWorker' in navigator) || !('PushManager' in window)) return
                try {
                    const permission = await Notification.requestPermission()
                    if (permission !== 'granted') return
                    const reg = await navigator.serviceWorker.ready
                    const vapidKey = urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
                    const existing = await reg.pushManager.getSubscription()
                    const sub = existing || await reg.pushManager.subscribe({
                        userVisibleOnly: true,
                        applicationServerKey: vapidKey
                    })
                    await fetch('/api/subscribe', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: userId, subscription: sub.toJSON() })
                    })
                } catch (e) {
                    console.error('Push setup error:', e)
                }
            }

            async function loadNotifySettings() {
                const { data } = await sb
                    .from('notify_settings')
                    .select('notify_new_trip, notify_complete, notify_expense, notify_maintenance')
                    .eq('user_id', currentOwnerProfileId)
                    .maybeSingle()
                document.getElementById('notif-new-trip').checked    = data ? data.notify_new_trip    : true
                document.getElementById('notif-complete').checked     = data ? data.notify_complete     : true
                document.getElementById('notif-expense').checked      = data ? data.notify_expense      : true
                document.getElementById('notif-maintenance').checked  = data ? data.notify_maintenance  : true
            }

            async function saveNotifySetting(key, value) {
                console.log('saveNotifySetting', key, value, currentOwnerProfileId)
                await sb.from('notify_settings')
                    .upsert({ user_id: currentOwnerProfileId, [key]: value }, { onConflict: 'user_id' })
            }

            function toNumber(value) {
                const n = Number(value)
                return Number.isFinite(n) ? n : 0
            }

            function setTotals(totalDT = 0, totalCP = 0, totalluong = 0) {
                const totalLN = totalDT - totalCP
                document.getElementById('tong-doanh-thu').textContent = formatMoney(totalDT)
                document.getElementById('tong-chi-phi').textContent = formatMoney(totalCP)
                document.getElementById('tong-loi-nhuan').textContent = formatMoney(totalLN)
                document.getElementById('tong-luong').textContent = formatMoney(totalluong)
            }

            function showStatus(message, type) {
                statusMessage.textContent = message
                statusMessage.className = `message ${type}`
                statusMessage.hidden = false
            }

            function hideStatus() {
                statusMessage.hidden = true
                statusMessage.className = ''
                statusMessage.textContent = ''
            }

            function renderTrips(trips) {
                const tbody = document.getElementById('report-body')
                tbody.textContent = ''

                trips.forEach((trip) => {
                    const row = document.createElement('tr')
                    row.style.cursor = 'pointer'
                    row.addEventListener('click', () => {
                      document.querySelectorAll('#report-body tr').forEach(r => r.style.background = '')
                      row.style.background = '#e3f2fd'
                    })
                    row.addEventListener('touchend', () => {
                      document.querySelectorAll('#report-body tr').forEach(r => r.style.background = '')
                      row.style.background = '#e3f2fd'
                    }, { passive: true })
                    const doanhThu = toNumber(trip.doanh_thu)
                    const chiPhi = toNumber(trip.chi_phi)
                    const loiNhuan = doanhThu - chiPhi

                    const values = [
                        formatDate(trip.ngay_bat_dau),
                        trip.tuyen_duong ?? '',
                        formatMoney(doanhThu),
                        formatMoney(chiPhi),
                        formatMoney(loiNhuan),
                        formatMoney(toNumber(trip.luong_chuyen))
                    ]

                    values.forEach((value, index) => {
                        const cell = document.createElement('td')
                        cell.textContent = value
                        if (index === 2) cell.style.color = '#2ecc71'
                        if (index === 3) cell.style.color = '#e74c3c'
                        if (index === 4) cell.style.color = '#3498db'
                        row.appendChild(cell)
                    })

                    const detailCell = document.createElement('td')
                    const detailBtn = document.createElement('button')
                    detailBtn.className = 'btn btn-sm'
                    detailBtn.textContent = 'Chi tiết'
                    detailBtn.onclick = () => window.location.href = 'trip-detail.html?trip_id=' + trip.id
                    detailCell.appendChild(detailBtn)
                    row.appendChild(detailCell)

                    tbody.appendChild(row)
                })
            }

            async function loadTrips() {
                let query = sb.from('trips').select('*').eq('owner_id', currentOwnerProfileId).order('ngay_bat_dau', { ascending: false })
                const month = document.getElementById('filter-month').value
                if (month) {
                    const start = month + '-01'
                    const end = new Date(month + '-01')
                    end.setMonth(end.getMonth() + 1)
                    const endStr = end.toISOString().split('T')[0]
                    query = query.gte('ngay_bat_dau', start + 'T00:00:00').lt('ngay_bat_dau', endStr + 'T00:00:00')
                }

                const { data, error } = await query
                if (error) {
                    throw new Error(error.message)
                }
                

                const trips = Array.isArray(data) ? data : []
                const totalDT = trips.reduce((sum, c) => sum + toNumber(c.doanh_thu), 0)
                const totalCP = trips.reduce((sum, c) => sum + toNumber(c.chi_phi), 0)
                const totalluong = trips.reduce((sum, c) => sum + toNumber(c.luong_chuyen), 0)

                const { data: drivers } = await sb.from('users').select('id, full_name').eq('role', 'driver').eq('owner_id', currentOwnerProfileId)
                const driverMap = {}
                if (Array.isArray(drivers)) drivers.forEach(d => { driverMap[d.id] = d.full_name })

                setTotals(totalDT, totalCP, totalluong)

                if (trips.length === 0) {
                    document.getElementById('report-body').textContent = ''
                    showStatus('Chưa có dữ liệu chuyến đi', 'empty')
                    return
                }

                hideStatus()
                renderTrips(trips)
                saveChatContext(trips, totalDT, totalCP, totalluong, driverMap)
            }

            function clearFilter() {
                document.getElementById('filter-month').value = ''
                loadTrips()
            }

            async function initPage() {
                try {
                    setTotals(0, 0, 0)
                    hideStatus()
                    const auth = await requireRole(sb, 'owner')
                    if (!auth) return
                    currentOwnerProfileId = auth.profile.id
                    setupPushNotifications(currentOwnerProfileId)
                    loadNotifySettings()
                    await loadTrips()
                    tripsChannel = sb.channel('trips-changes')
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'trips' }, payload => {
                            console.log('Change detected:', payload)
                            loadTrips()
                        })
                        .subscribe()
                } catch (err) {
                    console.error('Owner dashboard error:', err)
                    setTotals(0, 0, 0)
                    document.getElementById('report-body').textContent = ''
                    showStatus('Không thể tải dữ liệu. Vui lòng thử lại.', 'error')
                }
            }

            async function logout() {
                await sb.auth.signOut()
                window.location.href = 'bai10.html'
            }

            function toggleNotifyPanel() {
                const p = document.getElementById('notify-panel')
                p.style.display = p.style.display === 'none' ? 'block' : 'none'
            }

            document.addEventListener('click', e => {
                if (!e.target.closest('#notify-panel') && !e.target.closest('button[onclick="toggleNotifyPanel()"]'))
                    document.getElementById('notify-panel').style.display = 'none'
            })

            setupLogoutListener(sb)
            initPage()
            window.addEventListener('beforeunload', () => {
                if (tripsChannel) sb.removeChannel(tripsChannel)
            })

            // ── Chatbot state ──────────────────────────────────────
            let chatOpen = false
            let messages = []
            let tripsData = []
            let totalsData = {}
            let driverMapData = {}

            function saveChatContext(trips, dt, cp, luong, driverMap) {
                tripsData = trips
                driverMapData = driverMap || {}
                totalsData = { tong_doanh_thu: dt, tong_chi_phi: cp, tong_loi_nhuan: dt - cp, tong_luong: luong }
            }

            function toggleChat() {
                chatOpen = !chatOpen
                document.getElementById('chat-panel').classList.toggle('hidden', !chatOpen)
                document.getElementById('chat-fab').style.display = chatOpen ? 'none' : 'flex'
                document.getElementById('chat-fab').textContent = chatOpen ? '✕' : '💬'
                if (chatOpen && messages.length === 0) {
                    appendBubble('assistant', 'Xin chào! Tôi có thể phân tích dữ liệu vận tải cho bạn. Hỏi gì đi 👇')
                }
            }

            function appendBubble(role, text) {
                const div = document.createElement('div')
                div.className = 'chat-bubble ' + role
                div.textContent = text
                const container = document.getElementById('chat-messages')
                container.appendChild(div)
                container.scrollTop = container.scrollHeight
                return div
            }

            function sendSuggested(btn) {
                document.getElementById('chat-suggest').style.display = 'none'
                document.getElementById('chat-input').value = btn.textContent
                sendMessage()
            }

            async function sendMessage() {
                const input = document.getElementById('chat-input')
                const text = input.value.trim()
                if (!text) return
                input.value = ''

                appendBubble('user', text)
                messages.push({ role: 'user', content: text })

                const context = {
                    thang_loc: document.getElementById('filter-month').value || 'tất cả',
                    ...totalsData,
                    danh_sach_chuyen: tripsData.map(t => ({
                        ngay: t.ngay_bat_dau,
                        tuyen: t.tuyen_duong,
                        tai_xe: driverMapData[t.tai_xe_id] || t.tai_xe_id,
                        doanh_thu: t.doanh_thu,
                        chi_phi: t.chi_phi,
                        loi_nhuan: toNumber(t.doanh_thu) - toNumber(t.chi_phi),
                        luong: t.luong_chuyen
                    }))
                }

                const systemPrompt = `Mày là trợ lý phân tích vận tải cho chủ xe. Trả lời ngắn gọn, súc tích bằng tiếng Việt. Dữ liệu hiện tại: ${JSON.stringify(context)}`

                const botBubble = appendBubble('assistant', '...')

                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'claude-sonnet-4-20250514',
                            max_tokens: 1000,
                            system: systemPrompt,
                            messages
                        })
                    })

                    if (!res.ok) {
                        botBubble.textContent = '❌ Lỗi kết nối API'
                        return
                    }

                    const reader = res.body.getReader()
                    const decoder = new TextDecoder()
                    const chatMessages = document.getElementById('chat-messages')
                    let buffer = ''
                    let fullText = ''

                    botBubble.textContent = ''

                    while (true) {
                        const { done, value } = await reader.read()
                        if (done) break

                        buffer += decoder.decode(value, { stream: true })
                        const lines = buffer.split('\n')
                        buffer = lines.pop()

                        for (const line of lines) {
                            if (!line.startsWith('data: ')) continue
                            try {
                                const json = JSON.parse(line.slice(6))
                                if (json.type === 'content_block_delta' && json.delta?.type === 'text_delta') {
                                    fullText += json.delta.text
                                    botBubble.textContent = fullText
                                    chatMessages.scrollTop = chatMessages.scrollHeight
                                }
                            } catch {}
                        }
                    }

                    if (fullText) messages.push({ role: 'assistant', content: fullText })
                    else if (!botBubble.textContent) botBubble.textContent = 'Không có phản hồi'
                } catch (err) {
                    botBubble.textContent = '❌ Lỗi kết nối API'
                    console.error(err)
                }
            }
        </script>
    <div class="toast" id="toast"></div>

    <!-- AI Chatbot -->
    <button id="chat-fab" onclick="toggleChat()">💬</button>

    <div id="chat-panel" class="chat-panel hidden">
      <div class="chat-header">
        <div class="chat-header-avatar">🤖</div>
        <div class="chat-header-info">
          <div class="name">AI Phân tích</div>
          <div class="status">● Trực tuyến</div>
        </div>
        <button onclick="toggleChat()">✕</button>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-suggest" id="chat-suggest">
        <button onclick="sendSuggested(this)">Tổng kết tháng này</button>
        <button onclick="sendSuggested(this)">Chuyến nào lợi nhuận cao nhất?</button>
        <button onclick="sendSuggested(this)">So sánh tháng này vs tháng trước</button>
        <button onclick="sendSuggested(this)">Tài xế nào làm tốt nhất?</button>
      </div>
      <div class="chat-input-row">
        <textarea id="chat-input" placeholder="Hỏi về dữ liệu vận tải..." rows="2"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
        <button onclick="sendMessage()">➤</button>
      </div>
    </div>
    </body>
</html>
