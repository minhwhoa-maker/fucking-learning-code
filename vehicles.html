<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý xe</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="shared.js"></script>
</head>
<body>
    <div class="header">
        <h2>🚛 Quản lý xe</h2>
        <div style="display:flex; gap: 10px">
            <button class="btn" onclick="window.location.href='owner-dashboard.html'">← Dashboard</button>
            <button class="btn btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <h3>Thêm xe mới</h3>
            <div class="form-row">
                <input type="text" id="new-bien-so" placeholder="Biển số">
                <input type="text" id="new-loai" placeholder="Loại xe">
                <input type="number" id="new-nam" placeholder="Năm sản xuất">
                <select id="new-tai-xe">
                    <option value="">-- Chọn tài xế --</option>
                </select>
            </div>
            <button class="btn" onclick="addVehicle()">+ Thêm xe</button>
        </div>
        <div class="card">
            <h3>Danh sách xe</h3>
            <div class="table-scroll wide">
                <table>
                    <thead>
                        <tr>
                            <th>Biển số</th>
                            <th>Loại</th>
                            <th>Năm sx</th>
                            <th>Tài xế</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="vehicle-list">
                        <tr><td colspan="6">Đang tải ...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        const sb = createSb()
        let drivers = []

        const statusLabels = {
            hoat_dong: '🟢 Hoạt động',
            bao_duong: '🟡 Bảo dưỡng',
            tam_nghi: '🔴 Tạm nghỉ'
        }
        const maintenanceTypes = [
            ['hong_hoc', 'Hỏng hóc'],
            ['linh_kien', 'Linh kiện'],
            ['lop_xe', 'Lốp xe'],
            ['dinh_ky', 'Định kỳ']
        ]

        function addCell(row, text) {
            const cell = document.createElement('td')
            cell.textContent = text
            row.appendChild(cell)
            return cell
        }

        function createButton(text, className, onClick) {
            const button = document.createElement('button')
            button.type = 'button'
            button.className = className
            button.style.padding = '6px 12px'
            button.textContent = text
            button.addEventListener('click', onClick)
            return button
        }

        function setVehicleMessage(message) {
            const tbody = document.getElementById('vehicle-list')
            tbody.textContent = ''
            const row = document.createElement('tr')
            const cell = document.createElement('td')
            cell.colSpan = 6
            cell.textContent = message
            row.appendChild(cell)
            tbody.appendChild(row)
        }

        async function loadDrivers() {
            try {
                const { data, error } = await sb.from('users').select('id, full_name').eq('role', 'driver')
                if (error) throw new Error(error.message)

                drivers = data || []
                const select = document.getElementById('new-tai-xe')
                select.textContent = ''
                const defaultOption = document.createElement('option')
                defaultOption.value = ''
                defaultOption.textContent = '-- Chọn tài xế --'
                select.appendChild(defaultOption)

                drivers.forEach(d => {
                    const option = document.createElement('option')
                    option.value = d.id
                    option.textContent = d.full_name || 'Chưa đặt tên'
                    select.appendChild(option)
                })
            } catch (err) {
                console.error('Load drivers error:', err)
                drivers = []
                alert('Không thể tải danh sách tài xế: ' + err.message)
            }
        }

        async function addVehicle() {
            const bien_so = document.getElementById('new-bien-so').value.trim()
            const loai_xe = document.getElementById('new-loai').value.trim()
            const namRaw = document.getElementById('new-nam').value
            const nam_sx = namRaw === '' ? null : Number(namRaw)
            const tai_xe_id = document.getElementById('new-tai-xe').value || null

            if (!bien_so) {
                alert('Vui lòng nhập biển số!')
                return
            }
            if (namRaw !== '' && !Number.isFinite(nam_sx)) {
                alert('Năm sản xuất không hợp lệ!')
                return
            }

            const { error } = await sb.from('xe').insert({
                bien_so,
                loai_xe,
                nam_sx,
                tai_xe_id,
                trang_thai: 'hoat_dong'
            })

            if (error) alert('Lỗi: ' + error.message)
            else {
                document.getElementById('new-bien-so').value = ''
                document.getElementById('new-loai').value = ''
                document.getElementById('new-nam').value = ''
                document.getElementById('new-tai-xe').value = ''
                loadVehicles()
            }
        }

        async function changeStatus(id, currentStatus) {
            const statusMap = {
                hoat_dong: 'bao_duong',
                bao_duong: 'tam_nghi',
                tam_nghi: 'hoat_dong'
            }
            const newStatus = statusMap[currentStatus] || 'hoat_dong'

            const { error } = await sb.from('xe').update({ trang_thai: newStatus }).eq('id', id)
            if (error) alert('Lỗi: ' + error.message)
            else loadVehicles()
        }

        async function deleteVehicle(id, bien_so) {
            if (!confirm('Xóa xe ' + bien_so + '?')) return
            const { error } = await sb.from('xe').delete().eq('id', id)
            if (error) alert('Lỗi: ' + error.message)
            else loadVehicles()
        }

        function buildMaintenanceRow(vehicleId, bienSo) {
            const today = new Date().toISOString().split('T')[0]
            const row = document.createElement('tr')
            row.id = 'maint-row-' + vehicleId
            row.style.display = 'none'

            const cell = document.createElement('td')
            cell.colSpan = 6
            cell.style.padding = '0 12px 12px'

            const panel = document.createElement('div')
            panel.className = 'maintenance-panel'

            const title = document.createElement('h4')
            title.textContent = '🔧 Bảo dưỡng xe ' + bienSo

            const formRow = document.createElement('div')
            formRow.className = 'form-row'

            const dateInput = document.createElement('input')
            dateInput.type = 'date'
            dateInput.id = 'maint-ngay-' + vehicleId
            dateInput.value = today

            const typeSelect = document.createElement('select')
            typeSelect.id = 'maint-loai-' + vehicleId
            maintenanceTypes.forEach(([value, label]) => {
                const option = document.createElement('option')
                option.value = value
                option.textContent = label
                typeSelect.appendChild(option)
            })

            const descInput = document.createElement('input')
            descInput.type = 'text'
            descInput.id = 'maint-mota-' + vehicleId
            descInput.placeholder = 'Mô tả'

            const costInput = document.createElement('input')
            costInput.type = 'number'
            costInput.id = 'maint-chiphi-' + vehicleId
            costInput.placeholder = 'Chi phí (VNĐ)'

            const addButton = createButton('+ Thêm', 'btn btn-success', () => addMaintenance(vehicleId))
            const history = document.createElement('div')
            history.id = 'maint-history-' + vehicleId

            formRow.append(dateInput, typeSelect, descInput, costInput, addButton)
            panel.append(title, formRow, history)
            cell.appendChild(panel)
            row.appendChild(cell)
            return row
        }

        async function loadVehicles() {
            try {
                const { data, error } = await sb.from('xe').select('*').order('created_at', { ascending: false })
                if (error) throw new Error(error.message)

                const tbody = document.getElementById('vehicle-list')
                if (!data || data.length === 0) {
                    setVehicleMessage('Chưa có xe nào')
                    return
                }

                tbody.textContent = ''
                data.forEach(v => {
                    const driver = drivers.find(d => d.id === v.tai_xe_id)
                    const row = document.createElement('tr')

                    const plateCell = document.createElement('td')
                    const plate = document.createElement('strong')
                    plate.textContent = v.bien_so || '-'
                    plateCell.appendChild(plate)
                    row.appendChild(plateCell)

                    addCell(row, v.loai_xe || '-')
                    addCell(row, v.nam_sx || '-')
                    addCell(row, driver ? driver.full_name : '-')

                    const statusCell = document.createElement('td')
                    const status = document.createElement('span')
                    status.className = statusLabels[v.trang_thai] ? 'status status-' + v.trang_thai : 'status'
                    status.textContent = statusLabels[v.trang_thai] || v.trang_thai || '-'
                    statusCell.appendChild(status)
                    row.appendChild(statusCell)

                    const actionCell = document.createElement('td')
                    const actions = document.createElement('div')
                    actions.style.display = 'flex'
                    actions.style.gap = '6px'
                    actions.style.flexWrap = 'wrap'
                    actions.append(
                        createButton('Đổi TT', 'btn', () => changeStatus(v.id, v.trang_thai)),
                        createButton('🔧 Bảo dưỡng', 'btn btn-warning', () => toggleMaintenance(v.id)),
                        createButton('Xóa', 'btn btn-danger', () => deleteVehicle(v.id, v.bien_so || ''))
                    )
                    actionCell.appendChild(actions)
                    row.appendChild(actionCell)

                    tbody.appendChild(row)
                    tbody.appendChild(buildMaintenanceRow(v.id, v.bien_so || ''))
                })
            } catch (err) {
                console.error('Load vehicles error:', err)
                setVehicleMessage('Không thể tải dữ liệu xe')
                alert('Lỗi: ' + err.message)
            }
        }

        function toggleMaintenance(xeId) {
            const row = document.getElementById('maint-row-' + xeId)
            if (!row) return
            if (row.style.display === 'none') {
                row.style.display = ''
                loadMaintenance(xeId)
            } else {
                row.style.display = 'none'
            }
        }

        function setMaintenanceMessage(container, message) {
            container.textContent = ''
            const p = document.createElement('p')
            p.style.color = '#999'
            p.style.marginTop = '8px'
            p.textContent = message
            container.appendChild(p)
        }

        async function loadMaintenance(xeId) {
            const container = document.getElementById('maint-history-' + xeId)
            if (!container) return
            setMaintenanceMessage(container, 'Đang tải...')

            const { data, error } = await sb.from('bao_duong').select('*').eq('xe_id', xeId).order('ngay', { ascending: false })
            if (error) {
                setMaintenanceMessage(container, 'Không thể tải lịch sử bảo dưỡng')
                alert('Lỗi: ' + error.message)
                return
            }

            if (!data || data.length === 0) {
                setMaintenanceMessage(container, 'Chưa có lịch sử bảo dưỡng')
                return
            }

            const loaiLabels = Object.fromEntries(maintenanceTypes)
            const table = document.createElement('table')
            table.style.marginTop = '12px'

            const thead = document.createElement('thead')
            const headRow = document.createElement('tr')
            const headers = ['Ngày', 'Loại', 'Mô tả', 'Chi phí', '']
            headers.forEach(label => {
                const th = document.createElement('th')
                th.textContent = label
                headRow.appendChild(th)
            })
            thead.appendChild(headRow)

            const tbody = document.createElement('tbody')
            data.forEach(m => {
                const row = document.createElement('tr')
                addCell(row, formatDate(m.ngay))
                addCell(row, loaiLabels[m.loai] || m.loai || '-')
                addCell(row, m.mo_ta || '-')
                addCell(row, m.chi_phi === null || m.chi_phi === undefined ? '-' : formatMoney(m.chi_phi))

                const actionCell = document.createElement('td')
                const deleteButton = createButton('Xóa', 'btn btn-danger', () => deleteMaintenance(m.id, xeId))
                deleteButton.style.padding = '4px 8px'
                deleteButton.style.fontSize = '12px'
                actionCell.appendChild(deleteButton)
                row.appendChild(actionCell)
                tbody.appendChild(row)
            })

            table.append(thead, tbody)
            container.textContent = ''
            container.appendChild(table)
        }

        async function addMaintenance(xeId) {
            const ngay = document.getElementById('maint-ngay-' + xeId).value
            const loai = document.getElementById('maint-loai-' + xeId).value
            const mo_ta = document.getElementById('maint-mota-' + xeId).value.trim()
            const chiPhiRaw = document.getElementById('maint-chiphi-' + xeId).value
            const chi_phi = chiPhiRaw === '' ? null : Number(chiPhiRaw)

            if (!ngay) {
                alert('Vui lòng chọn ngày!')
                return
            }
            if (chiPhiRaw !== '' && (!Number.isFinite(chi_phi) || chi_phi < 0)) {
                alert('Chi phí không hợp lệ!')
                return
            }

            const { error } = await sb.from('bao_duong').insert({ xe_id: xeId, ngay, loai, mo_ta, chi_phi })
            if (error) {
                alert('Lỗi: ' + error.message)
                return
            }

            document.getElementById('maint-mota-' + xeId).value = ''
            document.getElementById('maint-chiphi-' + xeId).value = ''
            loadMaintenance(xeId)
        }

        async function deleteMaintenance(id, xeId) {
            if (!confirm('Xóa bản ghi bảo dưỡng này?')) return
            const { error } = await sb.from('bao_duong').delete().eq('id', id)
            if (error) alert('Lỗi: ' + error.message)
            else loadMaintenance(xeId)
        }

        async function logout() {
            await sb.auth.signOut()
            window.location.href = 'bai10.html'
        }

        async function init() {
            setVehicleMessage('Đang tải ...')
            const auth = await requireRole(sb, 'owner')
            if (!auth) return
            await loadDrivers()
            await loadVehicles()
        }
        setupLogoutListener(sb)
        init()
    </script>
</body>
</html>
