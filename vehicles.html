<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý xe</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="shared.js"></script>
</head>
<body>
    <div class="header">
        <h2>🚛 Quản lý xe</h2>
        <div style="display:flex; gap: 10px">
            <button class="btn" onclick="window.location.href='owner-dashboard.html'">← Dashboard</button>
            <button class="btn btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <h3>Thêm xe mới</h3>
            <div class="form-row">
                <input type="text" id="new-bien-so" placeholder="Biển số">
                <input type="text" id="new-loai" placeholder="Loại xe">
                <input type="text" id="new-luong-co-ban" placeholder="Lương cơ bản (VNĐ/tháng)">
                <select id="new-tai-xe">
                    <option value="">-- Chọn tài xế --</option>
                </select>
            </div>
            <div class="form-row" style="align-items:center">
                <select id="new-cach-tinh-luong" style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;color:#1a1a2e;background:white">
                    <option value="khoan_chuyen">Khoán chuyến</option>
                    <option value="phan_tram_doanh_thu">% Doanh thu</option>
                </select>
                <div style="display:flex;align-items:center;gap:6px;flex:1">
                    <input type="text" id="new-gia-tri-luong" placeholder="Giá trị" style="flex:1">
                    <span id="new-gia-tri-suffix" style="color:var(--text-muted);font-size:14px;white-space:nowrap">đ</span>
                </div>
            </div>
            <button class="btn" onclick="addVehicle()">+ Thêm xe</button>
        </div>
        <div class="card">
            <h3>Danh sách xe</h3>
            <div class="table-scroll wide">
                <table>
                    <thead>
                        <tr>
                            <th>Biển số</th>
                            <th>Loại</th>
                            <th>Lương cơ bản</th>
                            <th>Cách tính lương</th>
                            <th>Giá trị</th>
                            <th>Tài xế</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="vehicle-list">
                        <tr><td colspan="6">Đang tải ...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        function showToast(msg, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        function addDotFormat(input) {
            input.addEventListener('input', () => {
                const raw = input.value.replace(/\D/g, '')
                input.dataset.rawValue = raw
                input.value = raw ? raw.replace(/\B(?=(\d{3})+(?!\d))/g, '.') : ''
            })
        }

        function numberToVietnamese(n) {
            if (n === 0) return 'không đồng'
            const UNITS = ['', 'một', 'hai', 'ba', 'bốn', 'năm', 'sáu', 'bảy', 'tám', 'chín']
            function readTens(t, u) {
                if (t === 1) return 'mười' + (u > 0 ? ' ' + (u === 5 ? 'lăm' : UNITS[u]) : '')
                return UNITS[t] + ' mươi' + (u > 0 ? ' ' + (u === 1 ? 'mốt' : u === 5 ? 'lăm' : UNITS[u]) : '')
            }
            function readThreeDigits(n) {
                if (n === 0) return ''
                const h = Math.floor(n / 100)
                const t = Math.floor((n % 100) / 10)
                const u = n % 10
                if (h > 0) {
                    let r = UNITS[h] + ' trăm'
                    if (t === 0 && u > 0) r += ' lẻ ' + UNITS[u]
                    else if (t > 0) r += ' ' + readTens(t, u)
                    return r
                }
                return t > 0 ? readTens(t, u) : UNITS[u]
            }
            const ty = Math.floor(n / 1_000_000_000)
            const trieu = Math.floor((n % 1_000_000_000) / 1_000_000)
            const nghin = Math.floor((n % 1_000_000) / 1_000)
            const remainder = n % 1_000
            const parts = []
            if (ty > 0) parts.push(readThreeDigits(ty) + ' tỷ')
            if (trieu > 0) parts.push(readThreeDigits(trieu) + ' triệu')
            if (nghin > 0) parts.push(readThreeDigits(nghin) + ' nghìn')
            if (remainder > 0) parts.push(readThreeDigits(remainder))
            const result = parts.join(' ') + ' đ'
            return result.charAt(0).toUpperCase() + result.slice(1)
        }

        function addMoneyHint(input) {
            const hint = document.createElement('small')
            hint.style.cssText = 'color:var(--primary);font-size:0.85em;margin-top:4px;display:block;min-height:1.2em'
            input.type = 'text'
            input.addEventListener('input', () => {
                const pos = input.selectionStart
                const oldVal = input.value
                let digitsBefore = 0
                for (let i = 0; i < pos; i++) {
                    if (/\d/.test(oldVal[i])) digitsBefore++
                }
                const raw = input.value.replace(/\D/g, '')
                input.dataset.rawValue = raw
                const formatted = raw ? raw.replace(/\B(?=(\d{3})+(?!\d))/g, '.') : ''
                input.value = formatted
                let count = 0
                let newPos = formatted.length
                for (let i = 0; i < formatted.length; i++) {
                    if (/\d/.test(formatted[i])) count++
                    if (count === digitsBefore) { newPos = i + 1; break }
                }
                input.setSelectionRange(newPos, newPos)
                const n = Number(raw)
                hint.textContent = (raw && Number.isFinite(n)) ? numberToVietnamese(n) : ''
            })
            input.insertAdjacentElement('afterend', hint)
            return hint
        }

        const sb = createSb()
        let ownerProfileId = null
        let drivers = []
        let currentMaintXeId = null
        let maintModalChiPhiInitialized = false

        const statusLabels = {
            hoat_dong: '🟢 Hoạt động',
            bao_duong: '🟡 Bảo dưỡng',
            tam_nghi: '🔴 Tạm nghỉ'
        }
        const maintenanceTypes = [
            ['hong_hoc', 'Hỏng hóc'],
            ['linh_kien', 'Linh kiện'],
            ['lop_xe', 'Lốp xe'],
            ['dinh_ky', 'Định kỳ']
        ]

        function addCell(row, text) {
            const cell = document.createElement('td')
            cell.textContent = text
            row.appendChild(cell)
            return cell
        }

        function createButton(text, className, onClick) {
            const button = document.createElement('button')
            button.type = 'button'
            button.className = className
            button.style.padding = '6px 12px'
            button.textContent = text
            button.addEventListener('click', onClick)
            return button
        }

        function setVehicleMessage(message) {
            const tbody = document.getElementById('vehicle-list')
            tbody.textContent = ''
            const row = document.createElement('tr')
            const cell = document.createElement('td')
            cell.colSpan = 8
            cell.textContent = message
            row.appendChild(cell)
            tbody.appendChild(row)
        }

        async function loadDrivers() {
            try {
                const { data, error } = await sb.from('users').select('id, full_name, sdt').eq('role', 'driver').eq('owner_id', ownerProfileId)
                if (error) throw new Error(error.message)

                drivers = data || []
                const select = document.getElementById('new-tai-xe')
                select.textContent = ''
                const defaultOption = document.createElement('option')
                defaultOption.value = ''
                defaultOption.textContent = '-- Chọn tài xế --'
                select.appendChild(defaultOption)

                drivers.forEach(d => {
                    const option = document.createElement('option')
                    option.value = d.id
                    option.textContent = d.full_name || 'Chưa đặt tên'
                    select.appendChild(option)
                })
            } catch (err) {
                console.error('Load drivers error:', err)
                drivers = []
                showToast('Không thể tải danh sách tài xế: ' + err.message, 'error')
            }
        }

        async function addVehicle() {
            const bien_so = document.getElementById('new-bien-so').value.trim()
            const loai_xe = document.getElementById('new-loai').value.trim()
            const tai_xe_id = document.getElementById('new-tai-xe').value || null
            const luongEl = document.getElementById('new-luong-co-ban')
            const luong_co_ban = Number(luongEl.dataset.rawValue || luongEl.value.replace(/\./g, '')) || 0
            const cach_tinh_luong = document.getElementById('new-cach-tinh-luong').value || 'khoan_chuyen'
            const giaTriEl = document.getElementById('new-gia-tri-luong')
            const gia_tri_luong = Number(giaTriEl.dataset.rawValue || giaTriEl.value.replace(/\./g, '')) || 0

            if (!bien_so) {
                showToast('Vui lòng nhập biển số!', 'error')
                return
            }
            if (cach_tinh_luong === 'phan_tram_doanh_thu' && (gia_tri_luong < 0 || gia_tri_luong > 100)) {
                showToast('% lương phải từ 0 đến 100', 'error')
                return
            }

            const { data: existing, error: existingError } = await sb.from('xe').select('id').eq('owner_id', ownerProfileId).eq('bien_so', bien_so).maybeSingle()
            if (existingError) {
                showToast('Lỗi kiểm tra biển số: ' + existingError.message, 'error')
                return
            }
            if (existing) {
                showToast('Biển số đã tồn tại!', 'error')
                return
            }

            if (tai_xe_id) {
                const { data: driverBusy } = await sb.from('xe').select('id').eq('owner_id', ownerProfileId).eq('tai_xe_id', tai_xe_id).maybeSingle()
                if (driverBusy) {
                    showToast('Tài xế đang lái xe khác!', 'error')
                    return
                }
            }

            const { error } = await sb.from('xe').insert({
                owner_id: ownerProfileId,
                bien_so,
                loai_xe,
                tai_xe_id,
                trang_thai: tai_xe_id ? 'hoat_dong' : 'tam_nghi',
                luong_co_ban,
                cach_tinh_luong,
                gia_tri_luong
            })

            if (error) showToast('Lỗi: ' + error.message, 'error')
            else {
                document.getElementById('new-bien-so').value = ''
                document.getElementById('new-loai').value = ''
                const luongInput = document.getElementById('new-luong-co-ban')
                luongInput.value = ''
                luongInput.dataset.rawValue = ''
                document.getElementById('new-tai-xe').value = ''
                document.getElementById('new-cach-tinh-luong').value = 'khoan_chuyen'
                const giaTriResetEl = document.getElementById('new-gia-tri-luong')
                giaTriResetEl.value = ''
                giaTriResetEl.dataset.rawValue = ''
                document.getElementById('new-gia-tri-suffix').textContent = 'đ'
                loadVehicles()
            }
        }

        async function changeStatus(id, currentStatus, taiXeId) {
            const statusMap = {
                hoat_dong: 'bao_duong',
                bao_duong: taiXeId ? 'hoat_dong' : 'tam_nghi',
                tam_nghi: 'bao_duong'
            }
            const newStatus = statusMap[currentStatus] || (taiXeId ? 'hoat_dong' : 'tam_nghi')

            const { error } = await sb.from('xe').update({ trang_thai: newStatus }).eq('id', id)
            if (error) showToast('Lỗi: ' + error.message, 'error')
            else loadVehicles()
        }

        async function deleteVehicle(id, bien_so) {
            if (!confirm('Xóa xe ' + bien_so + '?')) return
            const { error } = await sb.from('xe').delete().eq('id', id)
            if (error) showToast('Lỗi: ' + error.message, 'error')
            else loadVehicles()
        }

        const PRESET_PARTS = [
            'Lốp trước trái', 'Lốp trước phải', 'Lốp sau trái', 'Lốp sau phải',
            'Nhớt động cơ', 'Lọc dầu', 'Lọc gió', 'Lọc nhiên liệu',
            'Má phanh trước', 'Má phanh sau', 'Đĩa phanh',
            'Ắc quy', 'Bugi', 'Dây curoa',
            'Đèn pha', 'Đèn hậu', 'Gương chiếu hậu',
            'Thay dầu hộp số', 'Bảo dưỡng điều hòa', 'Đăng kiểm', 'Bảo hiểm'
        ]


        async function loadVehicles() {
            try {
                const { data, error } = await sb.from('xe').select('*').eq('owner_id', ownerProfileId).order('created_at', { ascending: false })
                if (error) throw new Error(error.message)

                const { data: maintList } = await sb.from('bao_duong')
                    .select('xe_id, ngay_tiep_theo')
                    .eq('owner_id', ownerProfileId)
                    .not('ngay_tiep_theo', 'is', null)
                const nextMaintMap = {}
                if (maintList) {
                    maintList.forEach(m => {
                        if (!nextMaintMap[m.xe_id] || m.ngay_tiep_theo < nextMaintMap[m.xe_id]) {
                            nextMaintMap[m.xe_id] = m.ngay_tiep_theo
                        }
                    })
                }

                const tbody = document.getElementById('vehicle-list')
                if (!data || data.length === 0) {
                    setVehicleMessage('Chưa có xe nào')
                    return
                }

                tbody.textContent = ''
                data.forEach(v => {
                    const driver = drivers.find(d => d.id === v.tai_xe_id)
                    const row = document.createElement('tr')

                    const plateCell = document.createElement('td')
                    const plate = document.createElement('strong')
                    plate.textContent = v.bien_so ? formatBienSo(v.bien_so) : '-'
                    plate.style.color = 'var(--primary)'
                    plate.style.textDecoration = 'underline'
                    plate.style.cursor = 'pointer'
                    plate.addEventListener('click', () => openDriverModal(v.id, v.tai_xe_id))
                    plateCell.appendChild(plate)
                    if (nextMaintMap[v.id]) {
                        const daysLeft = Math.round((new Date(nextMaintMap[v.id]) - new Date()) / 86400000)
                        if (daysLeft <= 7) {
                            const warn = document.createElement('span')
                            warn.style.marginLeft = '6px'
                            warn.style.fontSize = '12px'
                            if (daysLeft >= 0) {
                                warn.textContent = '⚠️ ' + daysLeft + ' ngày'
                                warn.style.color = 'var(--warning)'
                            } else {
                                warn.textContent = '🔴 Quá hạn ' + (-daysLeft) + ' ngày'
                                warn.style.color = 'var(--danger)'
                            }
                            plateCell.appendChild(warn)
                        }
                    }
                    row.appendChild(plateCell)

                    addCell(row, v.loai_xe || '-')
                    addCell(row, formatMoney(v.luong_co_ban || 0))

                    // Cách tính lương
                    const luongTypeCell = document.createElement('td')
                    const luongTypeSelect = document.createElement('select')
                    luongTypeSelect.style.cssText = 'width:140px;padding:6px 8px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:#1a1a2e;background:white'
                    ;[['khoan_chuyen', 'Khoán chuyến'], ['phan_tram_doanh_thu', '% Doanh thu']].forEach(([val, text]) => {
                        const opt = document.createElement('option')
                        opt.value = val
                        opt.textContent = text
                        if (val === (v.cach_tinh_luong || 'khoan_chuyen')) opt.selected = true
                        luongTypeSelect.appendChild(opt)
                    })
                    luongTypeCell.appendChild(luongTypeSelect)
                    row.appendChild(luongTypeCell)

                    // Giá trị
                    const giaTriCell = document.createElement('td')
                    const giaTriWrap = document.createElement('div')
                    giaTriWrap.style.cssText = 'display:flex;align-items:center;gap:4px'
                    const giaTriInput = document.createElement('input')
                    giaTriInput.type = 'text'
                    giaTriInput.style.cssText = 'width:90px;padding:6px 8px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px'
                    const giaTriSuffix = document.createElement('span')
                    giaTriSuffix.style.cssText = 'color:var(--text-muted);font-size:13px'
                    const initMode = v.cach_tinh_luong || 'khoan_chuyen'
                    const rawVal = String(v.gia_tri_luong || 0)
                    giaTriInput.dataset.rawValue = rawVal
                    if (initMode === 'khoan_chuyen') {
                        giaTriInput.value = rawVal.replace(/\B(?=(\d{3})+(?!\d))/g, '.')
                        giaTriSuffix.textContent = 'đ'
                    } else {
                        giaTriInput.value = rawVal
                        giaTriSuffix.textContent = '%'
                    }
                    addDotFormat(giaTriInput)
                    luongTypeSelect.addEventListener('change', async () => {
                        const newMode = luongTypeSelect.value
                        giaTriInput.value = ''
                        giaTriInput.dataset.rawValue = ''
                        giaTriSuffix.textContent = newMode === 'khoan_chuyen' ? 'đ' : '%'
                        const { error } = await sb.from('xe').update({ cach_tinh_luong: newMode, gia_tri_luong: 0 }).eq('id', v.id)
                        if (error) showToast('Lỗi: ' + error.message, 'error')
                    })
                    giaTriInput.addEventListener('blur', async () => {
                        const raw = giaTriInput.dataset.rawValue || giaTriInput.value.replace(/\./g, '')
                        const val = Number(raw) || 0
                        if (luongTypeSelect.value === 'phan_tram_doanh_thu' && (val < 0 || val > 100)) {
                            showToast('% lương phải từ 0 đến 100', 'error')
                            return
                        }
                        const { error } = await sb.from('xe').update({ gia_tri_luong: val }).eq('id', v.id)
                        if (error) showToast('Lỗi: ' + error.message, 'error')
                    })
                    giaTriWrap.append(giaTriInput, giaTriSuffix)
                    giaTriCell.appendChild(giaTriWrap)
                    row.appendChild(giaTriCell)

                    addCell(row, driver ? driver.full_name : '-')

                    const statusCell = document.createElement('td')
                    const status = document.createElement('span')
                    status.className = statusLabels[v.trang_thai] ? 'status status-' + v.trang_thai : 'status'
                    status.textContent = statusLabels[v.trang_thai] || v.trang_thai || '-'
                    statusCell.appendChild(status)
                    row.appendChild(statusCell)

                    const actionCell = document.createElement('td')
                    const actions = document.createElement('div')
                    actions.style.display = 'flex'
                    actions.style.gap = '6px'
                    actions.style.flexWrap = 'wrap'
                    actions.append(
                        createButton('Đổi TT', 'btn', () => changeStatus(v.id, v.trang_thai, v.tai_xe_id)),
                        createButton('🔧 Bảo dưỡng', 'btn btn-warning', () => openMaintenanceModal(v.id, v.bien_so || '')),
                        createButton('📋 Chuyến', 'btn btn-success', () => openTripsModal(v.id, v.bien_so || '')),
                        createButton('Xóa', 'btn btn-danger', () => deleteVehicle(v.id, v.bien_so || ''))
                    )
                    actionCell.appendChild(actions)
                    row.appendChild(actionCell)

                    tbody.appendChild(row)
                })
            } catch (err) {
                console.error('Load vehicles error:', err)
                setVehicleMessage('Không thể tải dữ liệu xe')
                showToast('Lỗi: ' + err.message, 'error')
            }
        }

        function setMaintenanceMessage(container, message) {
            container.textContent = ''
            const p = document.createElement('p')
            p.style.color = '#999'
            p.style.marginTop = '8px'
            p.textContent = message
            container.appendChild(p)
        }

        function openMaintenanceModal(xeId, bienSo) {
            currentMaintXeId = xeId
            document.getElementById('maint-modal-title').textContent = '🔧 Bảo dưỡng xe ' + (bienSo ? formatBienSo(bienSo) : '')
            const today = new Date().toISOString().split('T')[0]
            document.getElementById('maint-modal-ngay').value = today
            document.getElementById('maint-modal-bophan').value = ''
            document.getElementById('maint-modal-loai').value = maintenanceTypes[0][0]
            document.getElementById('maint-modal-mota').value = ''
            const chiPhiEl = document.getElementById('maint-modal-chiphi')
            chiPhiEl.value = ''
            chiPhiEl.dataset.rawValue = ''
            const chiPhiHint = chiPhiEl.nextElementSibling
            if (chiPhiHint && chiPhiHint.tagName === 'SMALL') chiPhiHint.textContent = ''
            document.getElementById('maint-modal-ngaytiep').value = ''
            if (!maintModalChiPhiInitialized) {
                addMoneyHint(document.getElementById('maint-modal-chiphi'))
                maintModalChiPhiInitialized = true
            }
            document.getElementById('maintenance-modal').style.display = 'flex'
            loadMaintenanceModal()
        }

        function closeMaintenanceModal() {
            document.getElementById('maintenance-modal').style.display = 'none'
            currentMaintXeId = null
        }

        async function loadMaintenanceModal() {
            const xeId = currentMaintXeId
            if (!xeId) return
            const historyContainer = document.getElementById('maint-modal-history')
            if (!historyContainer) return
            setMaintenanceMessage(historyContainer, 'Đang tải...')

            const { data, error } = await sb.from('bao_duong').select('*, tai_xe:users!tai_xe_id(full_name)').eq('owner_id', ownerProfileId).eq('xe_id', xeId).order('ngay', { ascending: false })
            if (error) {
                setMaintenanceMessage(historyContainer, 'Không thể tải lịch sử bảo dưỡng')
                showToast('Lỗi: ' + error.message, 'error')
                return
            }

            const uniqueParts = [...new Set([...(data || []).map(m => m.bo_phan).filter(Boolean), ...PRESET_PARTS])]
            const datalist = document.getElementById('maint-modal-bophan-list')
            if (datalist) {
                datalist.textContent = ''
                uniqueParts.forEach(part => {
                    const opt = document.createElement('option')
                    opt.value = part
                    datalist.appendChild(opt)
                })
            }

            const dataParts = [...new Set((data || []).map(m => m.bo_phan).filter(Boolean))]
            const filterSelect = document.getElementById('maint-modal-filter')
            filterSelect.textContent = ''
            const allOpt = document.createElement('option')
            allOpt.value = ''
            allOpt.textContent = 'Tất cả'
            filterSelect.appendChild(allOpt)
            dataParts.forEach(part => {
                const opt = document.createElement('option')
                opt.value = part
                opt.textContent = part
                filterSelect.appendChild(opt)
            })

            if (!data || data.length === 0) {
                setMaintenanceMessage(historyContainer, 'Chưa có lịch sử bảo dưỡng')
                return
            }

            const loaiLabels = Object.fromEntries(maintenanceTypes)
            historyContainer.textContent = ''

            const tableContainer = document.createElement('div')
            historyContainer.appendChild(tableContainer)

            function renderTable(filtered) {
                tableContainer.textContent = ''
                const table = document.createElement('table')
                table.style.marginTop = '12px'
                const thead = document.createElement('thead')
                const headRow = document.createElement('tr')
                const headers = ['Ngày', 'Bộ phận', 'Người nhập', 'Loại', 'Mô tả', 'Chi phí', '']
                headers.forEach(label => {
                    const th = document.createElement('th')
                    th.textContent = label
                    headRow.appendChild(th)
                })
                thead.appendChild(headRow)
                const tbody = document.createElement('tbody')
                filtered.forEach(m => {
                    const row = document.createElement('tr')
                    addCell(row, formatDate(m.ngay))
                    addCell(row, m.bo_phan || '-')
                    addCell(row, m.nguoi_nhap === 'driver' ? '👤 ' + (m.tai_xe?.full_name || 'Tài xế') : m.nguoi_nhap === 'owner' ? '🏢 Chủ xe' : '-')
                    addCell(row, loaiLabels[m.loai] || m.loai || '-')
                    const moTaCell = document.createElement('td')
                    moTaCell.textContent = m.mo_ta || '-'
                    if (m.trip_id) {
                        const tripLink = document.createElement('a')
                        tripLink.href = 'trip-detail.html?trip_id=' + m.trip_id
                        tripLink.target = '_blank'
                        tripLink.style.cssText = 'margin-left:8px;color:var(--primary);font-size:0.85em'
                        tripLink.textContent = '→ Xem chuyến'
                        moTaCell.appendChild(tripLink)
                    }
                    row.appendChild(moTaCell)
                    addCell(row, m.chi_phi === null || m.chi_phi === undefined ? '-' : formatMoney(m.chi_phi))
                    const actionCell = document.createElement('td')
                    const deleteButton = createButton('Xóa', 'btn btn-danger', () => deleteMaintenanceModal(m.id))
                    deleteButton.style.padding = '4px 8px'
                    deleteButton.style.fontSize = '12px'
                    actionCell.appendChild(deleteButton)
                    row.appendChild(actionCell)
                    tbody.appendChild(row)
                })
                table.append(thead, tbody)
                tableContainer.appendChild(table)
            }

            filterSelect.onchange = () => {
                const val = filterSelect.value
                renderTable(val ? data.filter(m => m.bo_phan === val) : data)
            }

            renderTable(data)
        }

        async function addMaintenanceModal() {
            const xeId = currentMaintXeId
            if (!xeId) return
            const ngay = document.getElementById('maint-modal-ngay').value
            const loai = document.getElementById('maint-modal-loai').value
            const mo_ta = document.getElementById('maint-modal-mota').value.trim()
            const chiPhiEl = document.getElementById('maint-modal-chiphi')
            const chiPhiRaw = chiPhiEl.dataset.rawValue || chiPhiEl.value.replace(/\./g, '')
            const chi_phi = chiPhiRaw === '' ? null : Number(chiPhiRaw)
            const bo_phan = document.getElementById('maint-modal-bophan').value.trim() || null
            const ngay_tiep_theo = document.getElementById('maint-modal-ngaytiep').value || null

            if (!ngay) {
                showToast('Vui lòng chọn ngày!', 'error')
                return
            }
            if (chiPhiRaw !== '' && (!Number.isFinite(chi_phi) || chi_phi < 0)) {
                showToast('Chi phí không hợp lệ!', 'error')
                return
            }

            const { error } = await sb.from('bao_duong').insert({ owner_id: ownerProfileId, xe_id: xeId, ngay, loai, mo_ta, chi_phi, bo_phan, ngay_tiep_theo })
            if (error) {
                showToast('Lỗi: ' + error.message, 'error')
                return
            }

            document.getElementById('maint-modal-bophan').value = ''
            document.getElementById('maint-modal-mota').value = ''
            const chiPhiResetEl = document.getElementById('maint-modal-chiphi')
            chiPhiResetEl.value = ''
            chiPhiResetEl.dataset.rawValue = ''
            document.getElementById('maint-modal-ngaytiep').value = ''
            loadMaintenanceModal()
            loadVehicles()
        }

        async function deleteMaintenanceModal(id) {
            if (!confirm('Xóa bản ghi bảo dưỡng này?')) return
            const { error } = await sb.from('bao_duong').delete().eq('id', id)
            if (error) showToast('Lỗi: ' + error.message, 'error')
            else {
                loadMaintenanceModal()
                loadVehicles()
            }
        }

        let tripsModalVehicleId = null

        function openTripsModal(vehicleId, bienSo) {
            tripsModalVehicleId = vehicleId
            document.getElementById('trips-modal-title').textContent = '🚛 Xe ' + formatBienSo(bienSo)
            document.getElementById('trips-modal').style.display = 'flex'
            loadTripsModal()
        }

        function closeTripsModal() {
            document.getElementById('trips-modal').style.display = 'none'
            tripsModalVehicleId = null
        }

        function reloadTripsModal() {
            loadTripsModal()
        }

        async function loadTripsModal() {
            const container = document.getElementById('trips-modal-body')
            container.textContent = 'Đang tải...'

            const month = document.getElementById('trips-filter-month').value
            let query = sb.from('trips').select('*').eq('owner_id', ownerProfileId).eq('xe_id', tripsModalVehicleId).order('ngay_bat_dau', { ascending: false })

            if (month) {
                const [year, mon] = month.split('-').map(Number)
                const nextDate = new Date(year, mon, 1)
                const nextYear = nextDate.getFullYear()
                const nextMon = String(nextDate.getMonth() + 1).padStart(2, '0')
                const nextMonthStr = nextYear + '-' + nextMon + '-01'
                query = query.gte('ngay_bat_dau', month + '-01T00:00:00').lt('ngay_bat_dau', nextMonthStr + 'T00:00:00')
            }

            const { data, error } = await query
            if (error) {
                container.textContent = 'Không thể tải chuyến xe'
                showToast('Lỗi: ' + error.message, 'error')
                return
            }

            if (!data || data.length === 0) {
                container.textContent = 'Chưa có chuyến xe nào'
                return
            }

            const tripStatusLabels = {
                dang_chay: '🟡 Đang chạy',
                hoan_thanh: '✅ Hoàn thành'
            }

            const table = document.createElement('table')
            const thead = document.createElement('thead')
            const headRow = document.createElement('tr')
            ;['Ngày', 'Tuyến đường', 'Tài xế', 'Doanh thu', 'Trạng thái'].forEach(label => {
                const th = document.createElement('th')
                th.textContent = label
                headRow.appendChild(th)
            })
            thead.appendChild(headRow)

            const tbody = document.createElement('tbody')
            data.forEach(t => {
                const row = document.createElement('tr')
                addCell(row, formatDate(t.ngay_bat_dau))
                addCell(row, t.tuyen_duong || '-')
                addCell(row, drivers.find(d => d.id === t.tai_xe_id)?.full_name || '-')
                const revenueCell = addCell(row, t.doanh_thu === null || t.doanh_thu === undefined ? '-' : formatMoney(t.doanh_thu))
                revenueCell.style.color = '#e67e22'
                addCell(row, tripStatusLabels[t.trang_thai] || t.trang_thai || '-')
                tbody.appendChild(row)
            })

            table.append(thead, tbody)
            container.textContent = ''
            container.appendChild(table)
        }

        let modalVehicleId = null

        function openDriverModal(vehicleId, currentTaiXeId) {
            modalVehicleId = vehicleId
            const select = document.getElementById('modal-tai-xe')
            select.textContent = ''
            const noneOption = document.createElement('option')
            noneOption.value = ''
            noneOption.textContent = '-- Không có tài xế --'
            select.appendChild(noneOption)
            drivers.forEach(d => {
                const option = document.createElement('option')
                option.value = d.id
                option.textContent = d.full_name || 'Chưa đặt tên'
                select.appendChild(option)
            })
            select.value = currentTaiXeId || ''
            const modal = document.getElementById('change-driver-modal')
            modal.style.display = 'flex'
        }

        function closeDriverModal() {
            document.getElementById('change-driver-modal').style.display = 'none'
            modalVehicleId = null
        }

        async function saveDriverChange() {
            if (!modalVehicleId) return
            const tai_xe_id = document.getElementById('modal-tai-xe').value || null
            const trang_thai = tai_xe_id ? 'hoat_dong' : 'tam_nghi'

            if (tai_xe_id) {
                const { data: driverBusy } = await sb.from('xe').select('id').eq('owner_id', ownerProfileId).eq('tai_xe_id', tai_xe_id).neq('id', modalVehicleId).maybeSingle()
                if (driverBusy) {
                    showToast('Tài xế đang lái xe khác!', 'error')
                    return
                }
            }

            const { error } = await sb.from('xe').update({ tai_xe_id, trang_thai }).eq('id', modalVehicleId)
            if (error) {
                showToast('Lỗi: ' + error.message, 'error')
                return
            }
            closeDriverModal()
            loadVehicles()
        }

        async function logout() {
            await sb.auth.signOut()
            window.location.href = 'bai10.html'
        }

        async function init() {
            setVehicleMessage('Đang tải ...')
            const auth = await requireRole(sb, 'owner')
            if (!auth) return
            ownerProfileId = auth.profile.id
            await loadDrivers()
            await loadVehicles()
            document.getElementById('new-bien-so').addEventListener('blur', () => {
                const input = document.getElementById('new-bien-so')
                const formatted = formatBienSo(input.value.trim())
                if (formatted) input.value = formatted
            })
            addDotFormat(document.getElementById('new-luong-co-ban'))
            addDotFormat(document.getElementById('new-gia-tri-luong'))
            document.getElementById('new-cach-tinh-luong').addEventListener('change', () => {
                const mode = document.getElementById('new-cach-tinh-luong').value
                const el = document.getElementById('new-gia-tri-luong')
                el.value = ''
                el.dataset.rawValue = ''
                document.getElementById('new-gia-tri-suffix').textContent = mode === 'khoan_chuyen' ? 'đ' : '%'
            })
        }
        setupLogoutListener(sb)
        init()
    </script>
    <div class="toast" id="toast"></div>

    <div id="trips-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
      <div style="background:var(--white);border-radius:var(--radius);padding:24px;width:600px;max-width:95%;max-height:80vh;overflow-y:auto;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h3 id="trips-modal-title" style="margin:0"></h3>
          <button class="btn btn-gray" onclick="closeTripsModal()">Đóng</button>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
          <input type="month" id="trips-filter-month">
          <button class="btn" onclick="reloadTripsModal()">Lọc</button>
        </div>
        <div id="trips-modal-body"></div>
      </div>
    </div>

    <div id="maintenance-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
        <div style="background:var(--white);border-radius:var(--radius);padding:24px;width:600px;max-width:95%;max-height:85vh;overflow-y:auto;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                <h3 id="maint-modal-title" style="margin:0"></h3>
                <button class="btn btn-gray" onclick="closeMaintenanceModal()">Đóng</button>
            </div>
            <h4 style="margin:0 0 12px">Thêm bảo dưỡng</h4>
            <div style="margin-bottom:12px">
                <label style="display:block;font-size:13px;color:var(--text-muted);margin-bottom:4px">Ngày</label>
                <input type="date" id="maint-modal-ngay" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;box-sizing:border-box">
            </div>
            <div style="margin-bottom:12px">
                <label style="display:block;font-size:13px;color:var(--text-muted);margin-bottom:4px">Bộ phận</label>
                <input type="text" id="maint-modal-bophan" list="maint-modal-bophan-list" placeholder="Bộ phận (vd: lốp trước trái)" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;box-sizing:border-box">
                <datalist id="maint-modal-bophan-list"></datalist>
            </div>
            <div style="margin-bottom:12px">
                <label style="display:block;font-size:13px;color:var(--text-muted);margin-bottom:4px">Loại</label>
                <select id="maint-modal-loai" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;color:#1a1a2e;background:white;box-sizing:border-box">
                    <option value="hong_hoc">Hỏng hóc</option>
                    <option value="linh_kien">Linh kiện</option>
                    <option value="lop_xe">Lốp xe</option>
                    <option value="dinh_ky">Định kỳ</option>
                </select>
            </div>
            <div style="margin-bottom:12px">
                <label style="display:block;font-size:13px;color:var(--text-muted);margin-bottom:4px">Mô tả</label>
                <input type="text" id="maint-modal-mota" placeholder="Mô tả" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;box-sizing:border-box">
            </div>
            <div style="margin-bottom:12px">
                <label style="display:block;font-size:13px;color:var(--text-muted);margin-bottom:4px">Chi phí</label>
                <input type="text" id="maint-modal-chiphi" placeholder="Chi phí (VNĐ)" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;box-sizing:border-box">
            </div>
            <div style="margin-bottom:12px">
                <label style="display:block;font-size:13px;color:var(--text-muted);margin-bottom:4px">Ngày tiếp theo</label>
                <input type="date" id="maint-modal-ngaytiep" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;box-sizing:border-box">
            </div>
            <button class="btn btn-full" onclick="addMaintenanceModal()" style="margin-bottom:20px">+ Thêm bảo dưỡng</button>
            <h4 style="margin:0 0 8px">Lịch sử bảo dưỡng</h4>
            <select id="maint-modal-filter" style="padding:6px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:#1a1a2e;background:white;margin-bottom:8px">
                <option value="">Tất cả</option>
            </select>
            <div id="maint-modal-history"></div>
        </div>
    </div>

    <div id="change-driver-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
        <div style="background:var(--white);border-radius:var(--radius);padding:24px;width:320px;max-width:90%;">
            <h3 style="margin:0 0 16px">Đổi tài xế</h3>
            <select id="modal-tai-xe" style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;color:#1a1a2e;background:white">
                <option value="">-- Không có tài xế --</option>
            </select>
            <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end">
                <button class="btn btn-gray" onclick="closeDriverModal()">Hủy</button>
                <button class="btn" onclick="saveDriverChange()">Lưu</button>
            </div>
        </div>
    </div>
</body>
</html>
