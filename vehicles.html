<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý xe</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .header {
            background: #1565c0;
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container { padding: 24px; max-width: 1100px; margin: 0 auto; }
        .card {
            background: white;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }
        .card h3 { margin-bottom: 16px; color: #1565c0; }
        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .form-row input, .form-row select {
            flex: 1;
            min-width: 150px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
        }
        .btn {
            background: #1565c0;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }
        .btn:hover { background: #1976d2; }
        .btn-red { background: #e74c3c; }
        .btn-logout { background: #e74c3c; }

        table { width: 100%; border-collapse: collapse; }
        th { background: #1565c0; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #f0f2f5; }
        tr:hover td { background: #f8f9fa; }

        .status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
        }
        .status-hoat_dong { background: #d4edda; color: #155724; }
        .status-bao_duong { background: #fff3cd; color: #856404; }
        .status-tam_nghi { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="header">
        <h2>🚛 Quản lý xe</h2>
        <div style="display:flex; gap: 100px">
            <button class="btn" onclick="window.location.href='owner-dashboard.html'">← Dashboard</button>
            <button class="btn btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <h3>Thêm xe mới</h3>
            <div class="form-row">
                <input type="text" id="new-bien-so" placeholder="Biển số">
                <input type="text" id="new-loai" placeholder="Loại xe">
                <input type="number" id="new-nam" placeholder="Năm sản xuất">
                <select id="new-tai-xe">
                    <option value="">-- Chọn tài xế --</option>
                </select>
            </div>
            <button class="btn" onclick="addVehicle()">+ Thêm xe</button>
        </div>
        <div class="card">
            <h3>Danh sách xe</h3>
            <table>
                <thead>
                    <tr>
                        <th>Biển số</th>
                        <th>Loại</th>
                        <th>Năm sx</th>
                        <th>Tài xế</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="vehicle-list">
                    <tr><td colspan="6">Đang tải ...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        const { createClient } = supabase
        const sb = createClient(
            'https://icwmtqfpbefntfxboofr.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imljd210cWZwYmVmbnRmeGJvb2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mzg3NzgsImV4cCI6MjA5MjUxNDc3OH0.N1gsPt4eZav2LL2XDttqlsAB06b1UzXb4bFTMi3K8NM'
        )
        let drivers = []

        async function loadDrivers() {
            const { data } = await sb.from('users').select('*').eq('role', 'driver')
            drivers = data || []
            const select = document.getElementById('new-tai-xe')
            select.innerHTML = '<option value="">-- Chọn tài xế --</option>'
            drivers.forEach(d => {
                select.innerHTML += `<option value="${d.id}">${d.full_name}</option>`
            })
        }

        async function addVehicle() {
            const bien_so = document.getElementById('new-bien-so').value.trim()
            const loai_xe = document.getElementById('new-loai').value.trim()
            const nam_sx = parseInt(document.getElementById('new-nam').value) || null
            const tai_xe_id = document.getElementById('new-tai-xe').value || null

            if (!bien_so) {
                alert('Vui lòng nhập biển số!')
                return
            }
            const { error } = await sb.from('xe').insert({
                bien_so, loai_xe, nam_sx, tai_xe_id, trang_thai: 'hoat_dong'
            })

            if (error) alert('Lỗi: ' + error.message)
            else {
                document.getElementById('new-bien-so').value = ''
                document.getElementById('new-loai').value = ''
                document.getElementById('new-nam').value = ''
                document.getElementById('new-tai-xe').value = ''
                loadVehicles()
            }
        }

        async function changeStatus(id, currentStatus) {
            const statusMap = {
                'hoat_dong': 'bao_duong',
                'bao_duong': 'tam_nghi',
                'tam_nghi': 'hoat_dong'
            }
            const newStatus = statusMap[currentStatus] || 'hoat_dong'

            const { error } = await sb.from('xe').update({ trang_thai: newStatus }).eq('id', id)
            if (error) alert('Lỗi: ' + error.message)
            else loadVehicles()
        }

        async function deleteVehicle(id, bien_so) {
            if (!confirm('Xóa xe ' + bien_so + '?')) return
            const { error } = await sb.from('xe').delete().eq('id', id)
            if (error) alert('Lỗi: ' + error.message)
            else loadVehicles()
        }

        async function loadVehicles() {
            const { data } = await sb.from('xe').select('*').order('created_at', { ascending: false })

            const tbody = document.getElementById('vehicle-list')
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">Chưa có xe nào</td></tr>'
                return
            }

            const statusLabels = {
                'hoat_dong': '🟢 Hoạt động',
                'bao_duong': '🟡 Bảo dưỡng',
                'tam_nghi': '🔴 Tạm nghỉ'
            }

            tbody.innerHTML = data.map(v => {
                const driver = drivers.find(d => d.id === v.tai_xe_id)
                return `
                    <tr>
                        <td><strong>${v.bien_so}</strong></td>
                        <td>${v.loai_xe || '-'}</td>
                        <td>${v.nam_sx || '-'}</td>
                        <td>${driver ? driver.full_name : '-'}</td>
                        <td><span class="status status-${v.trang_thai}">${statusLabels[v.trang_thai] || v.trang_thai}</span></td>
                        <td style="display:flex; gap:6px">
                            <button class="btn" style="padding:6px 12px" onclick="changeStatus('${v.id}', '${v.trang_thai}')">Đổi TT</button>
                            <button class="btn btn-red" style="padding:6px 12px" onclick="deleteVehicle('${v.id}', '${v.bien_so}')">Xóa</button>
                        </td>
                    </tr>
                `
            }).join('')
        }

        async function logout() {
            await sb.auth.signOut()
            window.location.href = 'bai10.html'
        }

        async function init() {
            await loadDrivers()
            await loadVehicles()
        }
        init()
    </script>
</body>
</html>
